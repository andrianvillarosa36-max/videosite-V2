<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu — 18+ Corner</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .menu-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 16px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ff4477;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 18px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
      cursor: pointer;
    }

    .menu-item.logout {
      color: #ff6666;
    }

    .back-link {
      display: inline-block;
      padding: 16px 18px 0 18px;
      color: var(--muted);
      text-decoration: none;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <a href="/adult.html" class="back-link">← Back</a>
  <div class="menu-header">🔞 Menu</div>

  <div class="menu-list">
    <a href="/settings.html" class="menu-item">⚙️ Settings</a>
    <div class="menu-item logout" onclick="logout()">🚪 Logout</div>
  </div>

  <script>
    function logout() {
      fetch('/api/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + sessionStorage.getItem('token') }
      }).catch(function() {});
      sessionStorage.removeItem('user');
      sessionStorage.removeItem('token');
      window.location.href = '/login.html';
    }
  </script>

</body>
</html>
