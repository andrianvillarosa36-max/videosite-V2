<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AnimeCorn</title>
  <style>
    :root {
      --bg: #0D1117;
      --card: #1C2333;
      --text: #ffffff;
      --border: #30363D;
      --accent: #00D4FF;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      text-align: center;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--text);
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
      font-size: 1rem;
    }
    button:hover {
      opacity: 0.9;
    }
    .secondary-btn {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .error-msg {
      color: #ff4444;
      font-size: 0.85rem;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>🌽 AnimeCorn</h2>
    <div id="errorMsg" class="error-msg"></div>
    
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    
    <button onclick="login()">Login</button>
    <button class="secondary-btn" onclick="register()">Create Account</button>
  </div>

  <script>
    // Simple helper to get/set users in local memory
    function getUsers() {
      return JSON.parse(localStorage.getItem('users') || '[]');
    }
    function setUsers(users) {
      localStorage.setItem('users', JSON.stringify(users));
    }
    function showError(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg;
      err.style.display = 'block';
    }

    function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      
      if (!u || !p) {
        showError("Please enter username and password.");
        return;
      }

      const users = getUsers();
      const foundUser = users.find(user => user.username === u && user.password === p);

      if (foundUser) {
        // Save session and redirect
        sessionStorage.setItem('user', JSON.stringify(foundUser));
        window.location.href = 'index.html'; // RELATIVE PATH FIX
      } else {
        showError("Invalid username or password.");
      }
    }

    function register() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value.trim();
      
      if (!u || !p) {
        showError("Please enter username and password to register.");
        return;
      }

      const users = getUsers();
      const exists = users.find(user => user.username === u);

      if (exists) {
        showError("Username already exists. Please login.");
      } else {
        // Create new user with a default avatar
        const newUser = {
          username: u,
          password: p,
          avatar: "😀",
          role: "user"
        };
        users.push(newUser);
        setUsers(users);
        
        // Auto-login and redirect
        sessionStorage.setItem('user', JSON.stringify(newUser));
        window.location.href = 'index.html'; // RELATIVE PATH FIX
      }
    }

    // If already logged in, skip this page entirely
    if (sessionStorage.getItem('user')) {
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
