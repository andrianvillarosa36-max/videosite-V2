<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0D1117" />
  <link rel="icon" href="/icon-512.png" />
</head>
<body class="auth-page">

  <div id="splashScreen" style="position:fixed; inset:0; background:#0D1117; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.4s ease;">
    <div style="font-size:3rem;">🌽</div>
    <div style="color:#00D4FF; font-size:1.1rem; font-weight:700; margin-top:8px;">AnimeCorn</div>
    <div style="margin-top:20px; width:36px; height:36px; border:3px solid #30363D; border-top-color:#00D4FF; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>


  <div class="auth-box">
    <h1 class="logo">▶ VideoSite</h1>
    <p class="auth-sub">Sign in to watch videos</p>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="field">
      <input type="text" id="username" placeholder="Username" />
    </div>
    <div class="field" style="position:relative;">
      <input type="password" id="password" placeholder="Password" style="padding-right:44px;" />
      <span onclick="togglePassword('password', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem;">👁️</span>
    </div>

    <button onclick="login()">Sign In</button>

    <p style="text-align:center; margin-top:16px; font-size:0.82rem; color:#8B949E;">
      Don't have an account? <a href="/signup.html" style="color:#00D4FF; text-decoration:none;">Sign up</a>
    </p>
  </div>

  <script>
    // If already logged in go to home
    if (localStorage.getItem('user')) {
      window.location.href = '/index.html';
    }

    function togglePassword(id, el) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type    = 'text';
        el.textContent = '🙈';
      } else {
        input.type    = 'password';
        el.textContent = '👁️';
      }
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!username || !password) {
        errorMsg.textContent = 'Please enter username and password.';
        errorMsg.style.display = 'block';
        return;
      }

      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('user', JSON.stringify(data));
        localStorage.setItem('token', data.token);
        if (data.role === 'admin') {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/index.html';
        }
      } else {
        errorMsg.textContent = data.message;
        errorMsg.style.display = 'block';
      }
    }

    setTimeout(function() {
      const splash = document.getElementById('splashScreen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(function() { splash.remove(); }, 400);
      }
    }, 300);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>

</body>
</html>
