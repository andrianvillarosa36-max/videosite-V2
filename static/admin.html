<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">▶ VideoSite</div>
    <div class="nav-right">
      <span style="color:#00D4FF; font-size:0.78rem;">ADMIN</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- ADD VIDEO FORM -->
  <div class="upload-box">
    <h2>Add New Video</h2>

    <div id="successMsg" class="success-msg">✓ Video added successfully!</div>
    <div id="errorMsg" class="error-msg"></div>

    <!-- TYPE SELECTOR -->
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <button onclick="setType('video')" id="typeVideo" class="grid-btn active" style="flex:1;">🎬 Single Video</button>
      <button onclick="setType('series')" id="typeSeries" class="grid-btn" style="flex:1;">📺 Series</button>
    </div>

    <input type="text" id="videoTitle" placeholder="Title..." />
    <input type="text" id="videoThumb" placeholder="Thumbnail URL (optional)..." />
    <input type="text" id="videoCategory" placeholder="Category..." />

    <!-- SINGLE VIDEO -->
    <div id="singleSection">
      <input type="text" id="videoUrl" placeholder="Video URL (from catbox.moe)..." />
    </div>

    <!-- SERIES EPISODES -->
    <div id="seriesSection" style="display:none;">
      <div id="episodeList"></div>
      <button onclick="addEpisodeField()" style="background:#1C2333; border:1px solid #30363D; color:#fff; margin-bottom:12px;">+ Add Episode</button>
    </div>

    <button onclick="addVideo()">+ Add</button>
  </div>

  <!-- HOW TO GET URL -->
  <div style="margin: 0 16px 16px; background:#1C2333; border:1px solid #30363D; border-radius:10px; padding:14px;">
    <p style="color:#00D4FF; font-size:0.85rem; font-weight:bold; margin-bottom:8px;">How to get a video URL:</p>
    <p style="color:#8B949E; font-size:0.78rem; line-height:1.7;">
      1. Open <strong style="color:#fff;">catbox.moe</strong> in your browser<br/>
      2. Tap <strong style="color:#fff;">Choose file</strong> and pick your video<br/>
      3. Tap <strong style="color:#fff;">Upload</strong><br/>
      4. Copy the link it gives you<br/>
      5. Paste it in the field above
    </p>
  </div>

  <!-- VIDEO LIST -->
  <div style="margin: 0 16px;">
    <h2 style="font-size:1rem; margin-bottom:12px;">Your Videos</h2>
    <div id="videoList"></div>
  </div>

  <script>
    const user = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!user || user.role !== 'admin') window.location.href = '/login.html';

    const token = sessionStorage.getItem('token');

    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    let currentType   = 'video';
    let episodeCount  = 0;

    function setType(type) {
      currentType = type;
      document.getElementById('singleSection').style.display  = type === 'video'  ? 'block' : 'none';
      document.getElementById('seriesSection').style.display  = type === 'series' ? 'block' : 'none';
      document.getElementById('typeVideo').classList.toggle('active',  type === 'video');
      document.getElementById('typeSeries').classList.toggle('active', type === 'series');
    }

    function addEpisodeField() {
      episodeCount++;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex; gap:8px; margin-bottom:8px; align-items:center;';
      div.innerHTML =
        '<input type="text" id="epTitle-' + episodeCount + '" placeholder="Episode ' + episodeCount + ' title..." style="flex:1; background:#0D1117; border:1px solid #30363D; border-radius:8px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none;" />' +
        '<input type="text" id="epUrl-' + episodeCount + '" placeholder="Episode URL..." style="flex:2; background:#0D1117; border:1px solid #30363D; border-radius:8px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none;" />' +
        '<button onclick="this.parentElement.remove()" style="background:#3a1a1a; border:1px solid #ff4444; color:#ff6666; border-radius:6px; padding:6px 10px; width:auto; cursor:pointer;">✕</button>';
      document.getElementById('episodeList').appendChild(div);
    }

    async function loadVideos() {
      const res    = await fetch('/api/videos');
      const videos = await res.json();
      const list   = document.getElementById('videoList');

      if (videos.length === 0) {
        list.innerHTML = '<p style="color:#8B949E;">No videos added yet.</p>';
        return;
      }

      list.innerHTML = '';
      videos.forEach(v => {
        const isSerias = v.type === 'series';
        list.innerHTML += `
          <div class="video-card admin-card" style="margin-bottom:10px;">
            <div class="card-info">
              <p class="video-title">${isSerias ? '📺 ' : '🎬 '}${v.title}</p>
              <p class="video-file">${isSerias ? v.episodes.length + ' episodes' : v.url}</p>
              <button onclick="deleteVideo('${v.filename || v.title}')"
                style="margin-top:8px; background:#3a1a1a; color:#ff6666;
                border:1px solid #ff4444; border-radius:6px; padding:6px 12px;
                font-size:0.78rem; width:auto; cursor:pointer;">
                🗑 Delete
              </button>
            </div>
          </div>
        `;
      });
    }

    async function addVideo() {
      const title    = document.getElementById('videoTitle').value.trim();
      const thumb    = document.getElementById('videoThumb').value.trim();
      const category = document.getElementById('videoCategory').value.trim();
      const successMsg = document.getElementById('successMsg');
      const errorMsg   = document.getElementById('errorMsg');

      successMsg.style.display = 'none';
      errorMsg.style.display   = 'none';

      if (!title) {
        errorMsg.textContent   = 'Please enter a title.';
        errorMsg.style.display = 'block';
        return;
      }

      let body = {};

      if (currentType === 'video') {
        const url = document.getElementById('videoUrl').value.trim();
        if (!url) {
          errorMsg.textContent   = 'Please enter a video URL.';
          errorMsg.style.display = 'block';
          return;
        }
        body = { title, thumb, category, url, type: 'video' };
      } else {
        const episodes = [];
        document.querySelectorAll('[id^="epTitle-"]').forEach(function(el) {
          const idx     = el.id.split('-')[1];
          const epTitle = el.value.trim();
          const epUrl   = document.getElementById('epUrl-' + idx).value.trim();
          if (epTitle && epUrl) episodes.push({ title: epTitle, url: epUrl });
        });
        if (episodes.length === 0) {
          errorMsg.textContent   = 'Please add at least one episode.';
          errorMsg.style.display = 'block';
          return;
        }
        body = { title, thumb, category, type: 'series', episodes };
      }

      const res  = await authFetch('/api/addvideo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json();

      if (data.success) {
        successMsg.style.display = 'block';
        document.getElementById('videoTitle').value    = '';
        document.getElementById('videoThumb').value    = '';
        document.getElementById('videoCategory').value = '';
        if (currentType === 'video') document.getElementById('videoUrl').value = '';
        else { document.getElementById('episodeList').innerHTML = ''; episodeCount = 0; }
        loadVideos();
      } else {
        errorMsg.textContent   = data.message;
        errorMsg.style.display = 'block';
      }
    }

    async function deleteVideo(id) {
      if (!confirm('Delete this video?')) return;
      const res  = await authFetch('/api/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: id })
      });
      const data = await res.json();
      if (data.success) loadVideos();
    }

    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    loadVideos();
  </script>

</body>
</html>
