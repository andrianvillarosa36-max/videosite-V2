<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .profile-header {
      background: #1C2333;
      border-bottom: 1px solid #30363D;
      padding: 24px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .profile-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF, #0077ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-role {
      color: #00D4FF;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .profile-bio {
      color: #8B949E;
      font-size: 0.82rem;
    }

    .edit-btn {
      background: #1C2333;
      border: 1px solid #30363D;
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      width: auto;
      margin-top: 10px;
    }

    .section {
      padding: 16px;
      border-bottom: 1px solid #30363D;
    }

    .section h2 {
      font-size: 0.95rem;
      margin-bottom: 14px;
      color: #00D4FF;
    }

    .avatar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .avatar-option {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1C2333;
      border: 2px solid #30363D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      transition: border-color 0.18s;
    }

    .avatar-option.selected {
      border-color: #00D4FF;
    }

    .bio-input {
      width: 100%;
      background: #0D1117;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 10px;
      resize: none;
      height: 80px;
    }

    .bio-input:focus { border-color: #00D4FF; }

    .save-btn {
      background: #00D4FF;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }

    .stars {
      display: flex;
      gap: 4px;
      font-size: 1.1rem;
    }

    .star { cursor: default; }
    .star.filled { color: #FFD700; }
    .star.empty  { color: #30363D; }

    .rating-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .grid-box {
      background: #1C2333;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .grid-box .grid-box-title {
      font-size: 0.62rem;
      color: #fff;
      line-height: 1.15;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .grid-box .grid-box-stars {
      font-size: 0.55rem;
      margin-top: 3px;
      color: #00D4FF;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .page-btn {
      background: #1C2333;
      border: 1px solid #30363D;
      color: #fff;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .page-btn.active {
      background: #00D4FF;
      border-color: #00D4FF;
      color: #000;
      font-weight: 700;
    }

    .rated-title {
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .rated-category {
      font-size: 0.72rem;
      color: #00D4FF;
      margin-bottom: 6px;
    }

    .edit-section {
      display: none;
      padding: 16px;
      border-bottom: 1px solid #30363D;
    }

    .edit-section.show { display: block; }

    .success-msg {
      background: #0a2a1a;
      border: 1px solid #00aa44;
      color: #00dd66;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 14px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🌽 AnimeCorn</div>
  </nav>

  <!-- PROFILE HEADER -->
  <div class="profile-header">
    <div class="profile-avatar" id="profileAvatar"></div>
    <div class="profile-info">
      <div class="profile-name" id="profileName"></div>
      <div class="profile-role" id="profileRole"></div>
      <div class="profile-bio" id="profileBio"></div>
      <button class="edit-btn" id="editProfileBtn" onclick="toggleEdit()">✏️ Edit Profile</button>
    </div>
  </div>

  <!-- EDIT SECTION -->
  <div class="edit-section" id="editSection">
    <div id="saveSuccess" class="success-msg">✓ Profile updated!</div>
    <h2 style="font-size:0.95rem; margin-bottom:12px; color:#00D4FF;">Choose Avatar</h2>
    <div class="avatar-grid" id="avatarGrid"></div>
    <h2 style="font-size:0.95rem; margin-bottom:8px; color:#00D4FF;">Bio</h2>
    <textarea class="bio-input" id="bioInput" placeholder="Tell us about yourself..."></textarea>
    <button class="save-btn" onclick="saveProfile()">Save Profile</button>
  </div>

  <!-- MAIN SITE RATINGS -->
  <div class="section">
    <h2 id="topRatedHeading" onclick="toggleSection('topRated')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
      <span>⭐ My Ratings</span>
      <span id="topRatedArrow">▾</span>
    </h2>
    <div id="topRated" class="rating-grid" style="display:none;"></div>
    <div id="topRatedPagination" class="pagination"></div>
  </div>

  <!-- 18+ CORNER RATINGS -->
  <div class="section">
    <h2 id="myRatingsHeading" onclick="toggleSection('myRatings')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
      <span>🔞 My 18+ Corner Ratings</span>
      <span id="myRatingsArrow">▾</span>
    </h2>
    <div id="myRatings" class="rating-grid" style="display:none;"></div>
    <div id="myRatingsPagination" class="pagination"></div>
  </div>

  <!-- APPROVED UPLOADS -->
  <div class="section">
    <h2 id="uploadsHeading" onclick="toggleSection('uploads')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
      <span>🎬 My Uploads</span>
      <span id="uploadsArrow">▾</span>
    </h2>
    <div id="uploads" class="rating-grid" style="display:none;"></div>
    <div id="uploadsPagination" class="pagination"></div>
  </div>

  <!-- BOTTOM NAVIGATION BAR -->
  <nav class="bottom-nav">
    <div class="bnav-item" onclick="window.location.href='/index.html'">
      <span class="bnav-icon">🏠</span>
      <span class="bnav-label">Home</span>
    </div>
    <div class="bnav-item" onclick="window.location.href='/index.html?cat=Favorites'">
      <span class="bnav-icon">❤️</span>
      <span class="bnav-label">Favourites</span>
    </div>
    <div class="bnav-item active" id="bnav-profile">
      <span class="bnav-icon">👤</span>
      <span class="bnav-label">Profile</span>
    </div>
    <div class="bnav-item" onclick="toggleMorePanel()">
      <span class="bnav-icon">☰</span>
      <span class="bnav-label">More</span>
    </div>
  </nav>

  <!-- SLIDE-OUT "MORE" PANEL -->
  <div id="moreOverlay" class="more-overlay" onclick="closeMorePanel()"></div>
  <div id="morePanel" class="more-panel">
    <a href="/settings.html" class="more-item">⚙️ Settings</a>
    <div class="more-item logout" onclick="logout()" style="color:#ff6666;">🚪 Logout</div>
  </div>

  <script>
    (function() {
      const themes = {
        dark:       { bg:'#0D1117', card:'#1C2333', text:'#ffffff', border:'#30363D', muted:'#8B949E', accent:'#00D4FF' },
        light:      { bg:'#f0f2f5', card:'#ffffff', text:'#1a1a1a', border:'#dcdfe4', muted:'#6b7280', accent:'#0077ff' },
        neonred:    { bg:'#0D0508', card:'#1f0a10', text:'#ffe5e8', border:'#3D1018', muted:'#a87c82', accent:'#FF1744' },
        neonpink:   { bg:'#0D0510', card:'#1f0a1a', text:'#ffe5f5', border:'#3D1030', muted:'#a87c9c', accent:'#FF2D9E' },
        neongreen:  { bg:'#050D08', card:'#0a1f12', text:'#e5ffe9', border:'#103D1E', muted:'#7ca889', accent:'#00FF66' },
        neonviolet: { bg:'#0A050D', card:'#160a1f', text:'#f0e5ff', border:'#2A103D', muted:'#947ca8', accent:'#B026FF' }
      };
      const name = localStorage.getItem('theme') || 'dark';
      const t = themes[name];
      document.documentElement.style.setProperty('--bg',     t.bg);
      document.documentElement.style.setProperty('--card',   t.card);
      document.documentElement.style.setProperty('--text',   t.text);
      document.documentElement.style.setProperty('--border', t.border);
      document.documentElement.style.setProperty('--muted',  t.muted);
      document.documentElement.style.setProperty('--accent', t.accent);
      document.body.style.background = t.bg;
      document.body.style.color      = t.text;
    })();

    // 1. Determine Identity Context (Am I viewing myself or someone else?)
    const loggedInUser = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!loggedInUser) window.location.href = '/login.html';

    const token = sessionStorage.getItem('token');

    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const targetUsername = urlParams.get('username') || loggedInUser.username;
    const isOwnProfile = (targetUsername === loggedInUser.username);

    const avatars = ['😀','🎬','🎮','👑','🦁','🐯','🦊','🐺','🎵','🚀','⚡','🔥','💎','🌙','🌟','🎯'];
    let selectedAvatar = loggedInUser.avatar || '😀';

    // Update Headings Dynamically based on context
    document.querySelector('#topRatedHeading span').textContent = isOwnProfile ? "⭐ My Ratings" : `⭐ ${targetUsername}'s Ratings`;
    document.querySelector('#myRatingsHeading span').textContent = isOwnProfile ? "🔞 My 18+ Corner Ratings" : `🔞 ${targetUsername}'s 18+ Corner Ratings`;
    
    // Hide edit button if looking at someone else's profile page
    if (!isOwnProfile) {
      document.getElementById('editProfileBtn').style.display = 'none';
    }

    // Anti-XSS Security Helper
    function escapeHTML(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    async function renderProfile() {
      const res   = await fetch('/api/users');
      const users = await res.json();
      const profileUser = users.find(u => u.username === targetUsername);

      if (!profileUser) {
        document.getElementById('profileName').textContent = "User Not Found";
        return;
      }

      // Keep active session payload synchronized if editing own profile
      if (isOwnProfile) {
        loggedInUser.avatar = profileUser.avatar;
        loggedInUser.bio    = profileUser.bio;
        sessionStorage.setItem('user', JSON.stringify(loggedInUser));
      }

      document.getElementById('profileAvatar').textContent = profileUser.avatar || '😀';
      document.getElementById('profileName').textContent   = profileUser.username;
      document.getElementById('profileRole').textContent   = profileUser.role || 'User';
      document.getElementById('profileBio').textContent    = profileUser.bio ? escapeHTML(profileUser.bio) : 'No bio yet.';
      document.getElementById('bioInput').value            = profileUser.bio || '';
    }

    function renderAvatarGrid() {
      const grid = document.getElementById('avatarGrid');
      grid.innerHTML = '';
      avatars.forEach(a => {
        grid.innerHTML += `
          <div class="avatar-option ${a === selectedAvatar ? 'selected' : ''}"
               onclick="selectAvatar('${escapeHTML(a)}', this)">
            ${escapeHTML(a)}
          </div>
        `;
      });
    }

    function selectAvatar(avatar, el) {
      selectedAvatar = avatar;
      document.querySelectorAll('.avatar-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }

    function toggleEdit() {
      const el = document.getElementById('editSection');
      el.classList.toggle('show');
      
      if (el.classList.contains('show')) {
        selectedAvatar = loggedInUser.avatar || '😀';
        renderAvatarGrid();
      }
    }

    async function saveProfile() {
      if (!isOwnProfile) return;
      const bio = document.getElementById('bioInput').value.trim();
      const res = await authFetch('/api/updateprofile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: loggedInUser.username, avatar: selectedAvatar, bio })
      });
      const data = await res.json();
      if (data.success) {
        loggedInUser.avatar = selectedAvatar;
        loggedInUser.bio    = bio;
        sessionStorage.setItem('user', JSON.stringify(loggedInUser));
        renderProfile();
        document.getElementById('saveSuccess').style.display = 'block';
        setTimeout(() => {
          document.getElementById('saveSuccess').style.display = 'none';
          document.getElementById('editSection').classList.remove('show');
        }, 1500);
      }
    }

    function starsHtml(rating) {
      let html = '<div class="stars">';
      for (let i = 1; i <= 5; i++) {
        html += `<span class="star ${i <= rating ? 'filled' : 'empty'}">★</span>`;
      }
      html += '</div>';
      return html;
    }

    // MODIFIED: Calculates high-score rankings restricted exclusively to this user's dataset
    const adultCategories = ['Anime corn', 'NTR Anime corn', 'Anime series corn', 'Corn'];

    let topRatedData = [];

    async function loadTopRated() {
      const res     = await fetch('/api/ratings');
      const ratings = await res.json();
      const vRes    = await fetch('/api/videos');
      const videos  = await vRes.json();

      const targetRatings = ratings.filter(r => {
        if (r.username !== targetUsername) return false;
        const v = videos.find(vv => (vv.type === 'series' ? vv.filename : vv.url) === r.videoUrl);
        return v && !adultCategories.includes(v.category);
      });

      topRatedData = targetRatings
        .map(r => {
          const videoInfo = videos.find(v => (v.type === 'series' ? v.filename : v.url) === r.videoUrl);
          return { ...videoInfo, personalScore: r.rating };
        })
        .filter(v => v.title)
        .sort((a, b) => b.personalScore - a.personalScore);

      renderTopRatedPage();
    }

    function renderTopRatedPage() {
      renderPaginatedGrid('topRated', topRatedData, v => `
        <div class="grid-box" onclick="window.location.href='/index.html'">
          <div class="grid-box-title">${escapeHTML(v.title)}</div>
          <div class="grid-box-stars">${'★'.repeat(v.personalScore)}</div>
        </div>
      `);
    }

    let myRatingsData = [];

    async function loadMyRatings() {
      const res     = await fetch('/api/ratings');
      const ratings = await res.json();
      const vRes    = await fetch('/api/videos');
      const videos  = await vRes.json();

      const mine = ratings.filter(r => {
        if (r.username !== targetUsername) return false;
        const v = videos.find(vv => (vv.type === 'series' ? vv.filename : vv.url) === r.videoUrl);
        return v && adultCategories.includes(v.category);
      });

      myRatingsData = mine
        .map(r => {
          const v = videos.find(vv => (vv.type === 'series' ? vv.filename : vv.url) === r.videoUrl);
          return v ? { ...v, personalScore: r.rating } : null;
        })
        .filter(v => v);

      renderMyRatingsPage();
    }

    function renderMyRatingsPage() {
      renderPaginatedGrid('myRatings', myRatingsData, v => `
        <div class="grid-box">
          <div class="grid-box-title">${escapeHTML(v.title)}</div>
          <div class="grid-box-stars">${'★'.repeat(v.personalScore)}</div>
        </div>
      `);
    }

    function toggleSection(id) {
      const box   = document.getElementById(id);
      const arrow = document.getElementById(id + 'Arrow');
      const isHidden = box.style.display === 'none';
      box.style.display = isHidden ? 'grid' : 'none';
      arrow.textContent = isHidden ? '▴' : '▾';
    }

    const PAGE_SIZE = 20;
    const pageState = {};

    function renderPaginatedGrid(boxId, items, renderItemFn) {
      const box   = document.getElementById(boxId);
      const pager = document.getElementById(boxId + 'Pagination');

      if (!items.length) {
        box.innerHTML = `<p style="color:#8B949E; grid-column: 1 / -1;">Nothing here yet.</p>`;
        pager.innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(items.length / PAGE_SIZE);
      if (!pageState[boxId] || pageState[boxId] > totalPages) pageState[boxId] = 1;
      const currentPage = pageState[boxId];

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = items.slice(start, start + PAGE_SIZE);

      box.innerHTML = pageItems.map(renderItemFn).join('');

      if (totalPages <= 1) {
        pager.innerHTML = '';
        return;
      }

      let pagerHtml = '';
      for (let p = 1; p <= totalPages; p++) {
        pagerHtml += `<div class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage('${boxId}', ${p})">${p}</div>`;
      }
      pager.innerHTML = pagerHtml;
    }

    function goToPage(boxId, page) {
      pageState[boxId] = page;
      if (boxId === 'topRated') renderTopRatedPage();
      if (boxId === 'myRatings') renderMyRatingsPage();
      if (boxId === 'uploads') renderUploadsPage();
    }

    function logout() {
      authFetch('/api/logout', { method: 'POST' }).catch(function() {});
      sessionStorage.removeItem('user');
      sessionStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    function toggleMorePanel() {
      document.getElementById('morePanel').classList.toggle('open');
      document.getElementById('moreOverlay').classList.toggle('open');
    }

    function closeMorePanel() {
      document.getElementById('morePanel').classList.remove('open');
      document.getElementById('moreOverlay').classList.remove('open');
    }

    renderProfile();
    loadTopRated();
    loadMyRatings();
    loadUploads();

    let uploadsData = [];

    async function loadUploads() {
      try {
        const res = await fetch('/api/useruploads?username=' + encodeURIComponent(targetUsername));
        uploadsData = await res.json();
      } catch (e) {
        uploadsData = [];
      }
      renderUploadsPage();
    }

    function renderUploadsPage() {
      renderPaginatedGrid('uploads', uploadsData, u => `
        <div class="grid-box">
          ${u.thumb ? `<img src="${escapeHTML(u.thumb)}" loading="lazy" alt="${escapeHTML(u.title || '')}" style="width:100%; height:60%; object-fit:cover; border-radius:4px; margin-bottom:4px;" onerror="this.style.display='none'">` : ''}
          <div class="grid-box-title">${escapeHTML(u.title || 'Untitled')}</div>
        </div>
      `);
    }
  </script>

</body>
</html>
