<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .submit-section {
      margin: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .submit-title {
      padding: 12px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }

    .form-body { padding: 0 16px 16px; }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
    }

    .field textarea { resize: vertical; min-height: 70px; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #000;
      border-radius: 8px;
      padding: 13px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .status-msg {
      font-size: 0.8rem;
      padding: 10px 16px;
      display: none;
    }

    .status-msg.error { color: #ff4477; }
    .status-msg.ok { color: #00FF88; }

    .my-sub-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .my-sub-item:last-child { border-bottom: none; }

    .my-sub-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .my-sub-title { font-size: 0.88rem; font-weight: 700; }

    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      text-transform: uppercase;
    }

    .badge.pending { background: #3D3010; color: #FFD060; }
    .badge.approved { background: #103D1E; color: #00FF88; }
    .badge.rejected { background: #3D1018; color: #FF6680; }

    .my-sub-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .my-sub-note {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
      display: none;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.2s;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">📤 Upload</div>
    <div class="nav-right">
      <a href="/index.html" style="color:var(--accent); font-size:0.82rem; text-decoration:none;">❌ Return</a>
    </div>
  </nav>

  <!-- SUBMIT FORM -->
  <div class="submit-section">
    <div class="submit-title">🎬 Add a Video or Series</div>

    <div class="form-body">
      <div class="field">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="e.g. My Favorite Movie" />
      </div>

      <div class="field">
        <label>Description / Notes</label>
        <textarea id="fDescription" placeholder="Tell us about it..."></textarea>
      </div>

      <div class="field">
        <label>Category</label>
        <input type="text" id="fCategory" placeholder="e.g. Action, Comedy, Anime" />
      </div>

      <div class="field">
        <label>Thumbnail Image (optional)</label>
        <input type="file" id="fThumb" accept="image/*" />
      </div>

      <div class="field">
        <label>Type</label>
        <select id="fType" onchange="onTypeChange()">
          <option value="video">Movie / Single Video</option>
          <option value="series">Series</option>
        </select>
      </div>

      <div class="field" id="fileFieldSingle" style="display:none;">
        <label>Video File (max 200MB)</label>
        <input type="file" id="fFile" accept="video/*" />
        <div class="hint">Large files may take a while to upload, especially on mobile data.</div>
      </div>

      <div class="field" id="fileFieldSeries" style="display:none;">
        <label>Episodes</label>
        <div id="episodeList"></div>
        <button type="button" onclick="addEpisodeRow()" style="width:100%; background:var(--bg); border:1px dashed var(--border); color:var(--accent); border-radius:8px; padding:10px; font-size:0.82rem; cursor:pointer; margin-top:6px;">+ Add Episode</button>
        <div class="hint">Each episode file max 200MB. Large batches may take a while to upload.</div>
      </div>

      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

      <div class="status-msg" id="statusMsg"></div>

      <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Upload</button>
    </div>
  </div>

  <!-- MY SUBMISSIONS -->
  <div class="submit-section">
    <div class="submit-title">📋 My Submissions</div>
    <div id="mySubmissionsList">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    const user  = JSON.parse(localStorage.getItem('user') || 'null');
    const token = localStorage.getItem('token');
    if (!user) window.location.href = '/login.html';

    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    function logout() {
      authFetch('/api/logout', { method: 'POST' }).catch(function() {});
      localStorage.removeItem('user');
      localStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    function onTypeChange() {
      const type = document.getElementById('fType').value;
      document.getElementById('fileFieldSingle').style.display = (type === 'video') ? 'block' : 'none';
      document.getElementById('fileFieldSeries').style.display = (type === 'series') ? 'block' : 'none';
      if (type === 'series' && document.getElementById('episodeList').children.length === 0) {
        addEpisodeRow();
      }
    }

    let episodeCount = 0;

    function addEpisodeRow() {
      const list = document.getElementById('episodeList');
      const idx = episodeCount++;
      const row = document.createElement('div');
      row.className = 'episode-row';
      row.style.cssText = 'background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px;';
      row.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <span style="font-size:0.72rem; color:var(--muted); font-weight:700;">EPISODE ${idx + 1}</span>
          <button type="button" onclick="this.closest('.episode-row').remove()" style="background:none; border:none; color:#ff4477; font-size:1rem; cursor:pointer; padding:2px 8px;">✕ Remove</button>
        </div>
        <input type="text" placeholder="Episode ${idx + 1} title" data-ep-title="${idx}" style="width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 11px; color:var(--text); font-size:0.8rem; margin-bottom:8px;" />
        <input type="file" accept="video/*" data-ep-file="${idx}" style="width:100%; font-size:0.75rem; color:var(--muted);" />
      `;
      list.appendChild(row);
    }	

    function showStatus(msg, isError) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + (isError ? 'error' : 'ok');
      el.style.display = 'block';
    }

    function hideStatus() {
      document.getElementById('statusMsg').style.display = 'none';
    }

    async function submitForm() {
      const title       = document.getElementById('fTitle').value.trim();
      const description = document.getElementById('fDescription').value.trim();
      const category     = document.getElementById('fCategory').value.trim();
      const type         = document.getElementById('fType').value;

      if (!title) {
        showStatus('Please enter a title.', true);
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      hideStatus();

      try {
        const thumbFile = document.getElementById('fThumb').files[0];
        const formData = new FormData();
        formData.append('title', title);
        formData.append('description', description);
        formData.append('category', category);
        formData.append('type', type);
        if (thumbFile) formData.append('thumb_file', thumbFile, thumbFile.name);

        document.getElementById('progressBar').style.display = 'block';

        try {
          if (type === 'series') {
            const fileInputs = document.querySelectorAll('[data-ep-file]');
            const titleInputs = document.querySelectorAll('[data-ep-title]');
            const episodeFiles = [];

            for (let i = 0; i < fileInputs.length; i++) {
              const f = fileInputs[i].files[0];
              if (!f) continue;
              if (f.size > 300 * 1024 * 1024) {
                showStatus(`"${f.name}" exceeds the 300MB limit.`, true);
                btn.disabled = false;
                document.getElementById('progressBar').style.display = 'none';
                return;
              }
              episodeFiles.push({ file: f, epTitle: titleInputs[i].value.trim() || ('Episode ' + (i + 1)) });
            }

            if (!episodeFiles.length) {
              showStatus('Please add at least one episode file.', true);
              btn.disabled = false;
              document.getElementById('progressBar').style.display = 'none';
              return;
            }

            const result = await uploadSeriesInChunks(episodeFiles, thumbFile, title, description, category, type, function(pct) {
              document.getElementById('progressFill').style.width = pct + '%';
            });
            showStatus('Files received! Processing in the background, you can leave this page.', false);
            clearForm();
            await pollUploadStatus(result.submission_id);
            loadMySubmissions();
          } else {
            const file = document.getElementById('fFile').files[0];
            if (!file) {
              showStatus('Please choose a video file.', true);
              btn.disabled = false;
              document.getElementById('progressBar').style.display = 'none';
              return;
            }
            if (file.size > 300 * 1024 * 1024) {
              showStatus('File exceeds the 300MB limit.', true);
              btn.disabled = false;
              document.getElementById('progressBar').style.display = 'none';
              return;
            }

            const result = await uploadSingleVideoInChunks(file, thumbFile, title, description, category, type, function(pct) {
              document.getElementById('progressFill').style.width = pct + '%';
            });
            showStatus('File received! Processing in the background, you can leave this page.', false);
            clearForm();
            await pollUploadStatus(result.submission_id);
            loadMySubmissions();
          }
        } catch (uploadErr) {
          showStatus(uploadErr.message || 'Upload failed.', true);
        }

        document.getElementById('progressBar').style.display = 'none';
      } catch (err) {
        showStatus('Network error. Please try again.', true);
      }

      btn.disabled = false;
    }

    function pollUploadStatus(submissionId) {
      return new Promise(function(resolve) {
        const interval = setInterval(async function() {
          try {
            const res = await authFetch('/api/uploadstatus?id=' + submissionId);
            const data = await res.json();
            if (data.success && data.status !== 'uploading') {
              clearInterval(interval);
              if (data.status === 'failed') {
                showStatus('Background upload failed: ' + (data.admin_note || 'unknown error'), true);
              } else {
                showStatus('Upload finished processing! Your video is now live.', false);
              }
              resolve();
            }
          } catch (e) {
            // keep polling, ignore transient errors
          }
        }, 4000);
      });
    }

    function uploadSingleChunk(uploadId, chunkIndex, blob) {
      return new Promise(function(resolve, reject) {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/uploadchunk?upload_id=' + uploadId + '&chunk_index=' + chunkIndex);
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        xhr.onload = function() {
          if (xhr.status === 200) resolve();
          else reject(new Error('Chunk upload failed (status ' + xhr.status + ')'));
        };
        xhr.onerror = function() { reject(new Error('Network error during chunk upload')); };
        xhr.send(blob);
      });
    }

    async function uploadFileWithChunking(file, onProgress) {
      const CHUNK_SIZE = 5 * 1024 * 1024;
      const uploadId = 'u' + Date.now() + Math.random().toString(36).slice(2);
      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

      for (let i = 0; i < totalChunks; i++) {
        const start = i * CHUNK_SIZE;
        const blob = file.slice(start, start + CHUNK_SIZE);

        let attempts = 0;
        while (attempts < 3) {
          try {
            await uploadSingleChunk(uploadId, i, blob);
            break;
          } catch (e) {
            attempts++;
            if (attempts >= 3) throw new Error('Failed to upload part of "' + file.name + '" after 3 attempts.');
            await new Promise(r => setTimeout(r, 1500));
          }
        }
        if (onProgress) onProgress(Math.round(((i + 1) / totalChunks) * 100));
      }

      return { uploadId, totalChunks };
    }

    async function finalizeOne(payload) {
      const res = await fetch('/api/finalizeupload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'Finalize failed.');
      return data;
    }

    async function uploadThumbIfPresent(thumbFile) {
      if (!thumbFile) return { thumbUploadId: '', thumbFilename: '', thumbTotalChunks: 0 };
      const result = await uploadFileWithChunking(thumbFile, function() {});
      await finalizeOne({
        upload_id: result.uploadId,
        total_chunks: result.totalChunks,
        filename: thumbFile.name,
        is_last_file: false,
        files_meta: []
      });
      return { thumbUploadId: result.uploadId, thumbFilename: thumbFile.name, thumbTotalChunks: result.totalChunks };
    }

    async function uploadSingleVideoInChunks(videoFile, thumbFile, title, description, category, type, onProgress) {
      const { thumbUploadId, thumbFilename, thumbTotalChunks } = await uploadThumbIfPresent(thumbFile);

      const videoResult = await uploadFileWithChunking(videoFile, onProgress);

      const data = await finalizeOne({
        upload_id: videoResult.uploadId,
        total_chunks: videoResult.totalChunks,
        filename: videoFile.name,
        field: 'video_file',
        title: title,
        description: description,
        category: category,
        type: type,
        thumb_upload_id: thumbUploadId,
        thumb_filename: thumbFilename,
        thumb_total_chunks: thumbTotalChunks,
        is_last_file: true,
        files_meta: []
      });
      return data;
    }

    async function uploadSeriesInChunks(episodeFiles, thumbFile, title, description, category, type, onProgress) {
      const { thumbUploadId, thumbFilename, thumbTotalChunks } = await uploadThumbIfPresent(thumbFile);

      let filesMeta = [];
      for (let i = 0; i < episodeFiles.length; i++) {
        const ep = episodeFiles[i];
        const isLast = i === episodeFiles.length - 1;

        const epResult = await uploadFileWithChunking(ep.file, function(pct) {
          const overall = Math.round(((i + (pct / 100)) / episodeFiles.length) * 100);
          onProgress(overall);
        });

        const payload = {
          upload_id: epResult.uploadId,
          total_chunks: epResult.totalChunks,
          filename: ep.file.name,
          ep_title: ep.epTitle,
          is_last_file: isLast,
          files_meta: filesMeta
        };

        if (isLast) {
          payload.title = title;
          payload.description = description;
          payload.category = category;
          payload.type = type;
          payload.thumb_upload_id = thumbUploadId;
          payload.thumb_filename = thumbFilename;
          payload.thumb_total_chunks = thumbTotalChunks;
        }

        const data = await finalizeOne(payload);
        if (isLast) return data;
        filesMeta = data.files_meta;
      }
    }

    function clearForm() {
      document.getElementById('fTitle').value = '';
      document.getElementById('fDescription').value = '';
      document.getElementById('fCategory').value = '';
      document.getElementById('fThumb').value = '';
      document.getElementById('fFile').value = '';
      document.getElementById('progressFill').style.width = '0%';
      document.getElementById('episodeList').innerHTML = '';
      episodeCount = 0;
      if (document.getElementById('fType').value === 'series') addEpisodeRow();
    }

    async function loadMySubmissions() {
      const list = document.getElementById('mySubmissionsList');
      try {
        const res  = await authFetch('/api/mysubmissions');
        const subs = await res.json();

        if (subs.length === 0) {
          list.innerHTML = '<div class="empty-state">You haven\'t submitted anything yet.</div>';
          return;
        }

        let html = '';
        subs.forEach(function(s) {
          const icon = s.kind === 'upload' ? '📁' : '💡';
          html += `
            <div class="my-sub-item">
              <div class="my-sub-top">
                <div class="my-sub-title">${icon} ${escapeHtml(s.title)}</div>
                <span class="badge ${s.status}">${s.status}</span>
              </div>
              ${s.description ? `<div class="my-sub-desc">${escapeHtml(s.description)}</div>` : ''}
              ${s.admin_note ? `<div class="my-sub-note">Admin note: ${escapeHtml(s.admin_note)}</div>` : ''}
              <div style="margin-top:6px;">
                <button onclick="deleteSubmission(${s.id})" style="background:none; border:none; color:#8B949E; font-size:0.7rem; cursor:pointer; padding:0; text-decoration:underline;">Remove from list</button>
              </div>
            </div>
          `;
        });
        list.innerHTML = html;
      } catch (err) {
        list.innerHTML = '<div class="empty-state">Couldn\'t load your submissions.</div>';
      }
    }

    async function deleteSubmission(id) {
      if (!confirm('Remove this from your submission history? This only clears this entry from the list — if it published a video, the video itself stays live. Delete that separately from the admin panel if you want it gone too.')) return;
      try {
        const res = await authFetch('/api/deletesubmission', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });
        const data = await res.json();
        if (data.success) {
          loadMySubmissions();
        } else {
          alert(data.message || 'Could not remove this entry.');
        }
      } catch (e) {
        alert('Network error. Please try again.');
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    onTypeChange();
    loadMySubmissions();
  </script>

</body>
</html>
