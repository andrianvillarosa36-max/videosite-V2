<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid #30363D;
      cursor: pointer;
      transition: background 0.18s;
    }

    .user-card:active { background: #1C2333; }

    .avatar-big {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF, #0077ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .user-details { flex: 1; }
    .user-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 3px; }
    .user-bio  { font-size: 0.75rem; color: #8B949E; }
    .user-role { font-size: 0.68rem; color: #00D4FF; font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }

    .view-btn {
      background: #1C2333;
      border: 1px solid #30363D;
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      width: auto;
    }

    /* PROFILE MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: #1C2333;
      border-radius: 18px 18px 0 0;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      padding-bottom: 20px;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 16px;
      border-bottom: 1px solid #30363D;
    }
    .modal-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF, #0077ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .modal-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 3px; }
    .modal-role { font-size: 0.72rem; color: #00D4FF; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .modal-bio  { font-size: 0.8rem; color: #8B949E; }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      width: auto;
      padding: 4px 10px;
    }
    .modal-section { padding: 14px 16px; }
    .modal-section h3 { font-size: 0.88rem; color: #00D4FF; margin-bottom: 10px; }

    .rated-card {
      background: #0D1117;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .rated-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; }
    .stars { display: flex; gap: 3px; font-size: 0.95rem; }
    .star.filled { color: #FFD700; }
    .star.empty  { color: #30363D; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">🌽 AnimeCorn</div>
    <div class="nav-right">
      <a href="/index.html" style="color:#00D4FF; font-size:0.82rem; text-decoration:none;">❌ Return</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div id="userList"></div>

  <!-- PROFILE MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal-sheet" id="modalSheet" style="position:relative;">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-header">
        <div class="modal-avatar" id="mAvatar"></div>
        <div>
          <div class="modal-name" id="mName"></div>
          <div class="modal-role" id="mRole"></div>
          <div class="modal-bio"  id="mBio"></div>
        </div>
      </div>

      <div class="modal-section">
        <h3 onclick="toggleSection('mFavorites')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
          <span>❤️ Their Favorites</span><span id="mFavoritesArrow">▾</span>
        </h3>
        <div id="mFavorites" style="display:none;"></div>
      </div>

      <div class="modal-section">
        <h3 onclick="toggleSection('mRatings')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
          <span>⭐ Their Ratings</span><span id="mRatingsArrow">▾</span>
        </h3>
        <div id="mRatings" style="display:none;"></div>
      </div>

      <div class="modal-section">
        <h3 onclick="toggleSection('mFavAdult')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
          <span>🔞❤️ Their 18+ Favorites</span><span id="mFavAdultArrow">▾</span>
        </h3>
        <div id="mFavAdult" style="display:none;"></div>
      </div>

      <div class="modal-section">
        <h3 onclick="toggleSection('mRatingsAdult')" style="cursor:pointer; display:flex; align-items:center; justify-content:space-between;">
          <span>🔞⭐ Their 18+ Ratings</span><span id="mRatingsAdultArrow">▾</span>
        </h3>
        <div id="mRatingsAdult" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const themes = {
        dark:       { bg:'#0D1117', card:'#1C2333', text:'#ffffff', border:'#30363D', muted:'#8B949E', accent:'#00D4FF' },
        light:      { bg:'#f0f2f5', card:'#ffffff', text:'#1a1a1a', border:'#dcdfe4', muted:'#6b7280', accent:'#0077ff' },
        neonred:    { bg:'#0D0508', card:'#1f0a10', text:'#ffe5e8', border:'#3D1018', muted:'#a87c82', accent:'#FF1744' },
        neonpink:   { bg:'#0D0510', card:'#1f0a1a', text:'#ffe5f5', border:'#3D1030', muted:'#a87c9c', accent:'#FF2D9E' },
        neongreen:  { bg:'#050D08', card:'#0a1f12', text:'#e5ffe9', border:'#103D1E', muted:'#7ca889', accent:'#00FF66' },
        neonviolet: { bg:'#0A050D', card:'#160a1f', text:'#f0e5ff', border:'#2A103D', muted:'#947ca8', accent:'#B026FF' }
      };
      const name = localStorage.getItem('theme') || 'dark';
      const t = themes[name];
      document.documentElement.style.setProperty('--bg',     t.bg);
      document.documentElement.style.setProperty('--card',   t.card);
      document.documentElement.style.setProperty('--text',   t.text);
      document.documentElement.style.setProperty('--border', t.border);
      document.documentElement.style.setProperty('--muted',  t.muted);
      document.documentElement.style.setProperty('--accent', t.accent);
      document.body.style.background = t.bg;
      document.body.style.color      = t.text;
    })();

    const user = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!user) window.location.href = '/login.html';

    const token = sessionStorage.getItem('token');

    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    async function loadUsers() {
      const res   = await fetch('/api/users');
      const users = await res.json();
      const list  = document.getElementById('userList');

      list.innerHTML = '';
      users.filter(u => u.role !== 'admin').forEach(u => {
        list.innerHTML += `
          <div class="user-card" onclick="openProfile('${u.username}')">
            <div class="avatar-big">${u.avatar || '😀'}</div>
            <div class="user-details">
              <div class="user-role">${u.role}</div>
              <div class="user-name">${u.username}</div>
              <div class="user-bio">${u.bio || 'No bio yet.'}</div>
            </div>
            <button class="view-btn">View</button>
          </div>
        `;
      });
    }

const adultCategories = ['Anime corn', 'NTR Anime corn', 'Anime series corn', 'Corn'];

    function getVideoId(v) {
      return v.type === 'series' ? (v.filename || v.title) : v.url;
    }

    function buildFavGrid(box, favUrls, videos, filterFn) {
      const matched = videos.filter(function(v) {
        return filterFn(v) && favUrls.includes(getVideoId(v));
      });
      if (matched.length === 0) {
        box.innerHTML = '<p style="color:#8B949E; font-size:0.8rem;">No favorites yet.</p>';
        return;
      }
      box.innerHTML = '<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>';
      const grid = box.querySelector('div');
      matched.forEach(function(v) {
        const thumbStyle = v.thumb ? 'background-image:url(' + v.thumb + '); background-size:cover; background-position:center;' : '';
        const div = document.createElement('div');
        div.style.cssText = 'aspect-ratio:2/3; border-radius:8px; background:#0D1117; ' + thumbStyle + ' position:relative; overflow:hidden;';
        div.innerHTML = '<div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.9)); padding:16px 5px 5px;"><div style="color:#fff; font-size:0.6rem; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">' + v.title + '</div></div>';
        grid.appendChild(div);
      });
    }

    function buildRatingsList(box, ratings, videos, filterFn) {
      const matched = ratings.filter(function(r) {
        const v = videos.find(function(vv) { return getVideoId(vv) === r.videoUrl; });
        return v && filterFn(v);
      });
      if (matched.length === 0) {
        box.innerHTML = '<p style="color:#8B949E; font-size:0.8rem;">No ratings yet.</p>';
        return;
      }
      box.innerHTML = '';
      matched.forEach(function(r) {
        const v = videos.find(function(vv) { return getVideoId(vv) === r.videoUrl; });
        if (!v) return;
        let stars = '<div class="stars">';
        for (let i = 1; i <= 5; i++) {
          stars += '<span class="star ' + (i <= r.rating ? 'filled' : 'empty') + '">★</span>';
        }
        stars += '</div>';
        box.innerHTML += '<div class="rated-card"><div class="rated-title">' + v.title + '</div>' + stars + '</div>';
      });
    }

    function toggleSection(id) {
      const box   = document.getElementById(id);
      const arrow = document.getElementById(id + 'Arrow');
      const isHidden = box.style.display === 'none';
      box.style.display = isHidden ? 'block' : 'none';
      arrow.textContent = isHidden ? '▴' : '▾';
    }

    async function openProfile(username) {
      const uRes    = await fetch('/api/users');
      const users   = await uRes.json();
      const u       = users.find(u => u.username === username);
      const rRes    = await fetch('/api/ratings');
      const ratings = await rRes.json();
      const vRes    = await fetch('/api/videos');
      const videos  = await vRes.json();
      const favRes  = await fetch('/api/favorites?username=' + username);
      const favData = await favRes.json();
      const favUrls = favData.map(f => f.videoUrl);

      document.getElementById('mAvatar').textContent = u.avatar || '😀';
      document.getElementById('mName').textContent   = u.username;
      document.getElementById('mRole').textContent   = u.role;
      document.getElementById('mBio').textContent    = u.bio || 'No bio yet.';

      const myRatings = ratings.filter(r => r.username === username);

      buildFavGrid(document.getElementById('mFavorites'), favUrls, videos, function(v) { return !adultCategories.includes(v.category); });
      buildFavGrid(document.getElementById('mFavAdult'), favUrls, videos, function(v) { return adultCategories.includes(v.category); });
      buildRatingsList(document.getElementById('mRatings'), myRatings, videos, function(v) { return !adultCategories.includes(v.category); });
      buildRatingsList(document.getElementById('mRatingsAdult'), myRatings, videos, function(v) { return adultCategories.includes(v.category); });
      }

      document.getElementById('modalOverlay').classList.add('open');
    }
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    function closeModalOutside(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    function logout() {
      authFetch('/api/logout', { method: 'POST' }).catch(function() {});
      sessionStorage.removeItem('user');
      sessionStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    loadUsers();
  </script>

</body>
</html>
