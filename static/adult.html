<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18+ Corner</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- AGE GATE CHECK (re-verifies on direct visit/refresh) -->
  <div id="ageGateOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:999; align-items:center; justify-content:center;">
    <div style="background:#1C2333; border:1px solid #30363D; border-radius:14px; padding:28px 24px; max-width:340px; text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:12px;">🔞</div>
      <p style="font-size:1.1rem; font-weight:700; margin-bottom:10px;">Are you 18 or older?</p>
      <p style="font-size:0.8rem; color:#8B949E; margin-bottom:20px;">This section contains adult content not suitable for minors.</p>
      <div style="display:flex; gap:10px;">
        <button onclick="window.location.href='/index.html'" style="flex:1; background:#1C2333; border:1px solid #30363D; color:#fff; border-radius:8px; padding:12px; font-size:0.9rem; cursor:pointer;">No</button>
        <button onclick="confirmAndStay()" style="flex:1; background:#00D4FF; border:none; color:#000; border-radius:8px; padding:12px; font-size:0.9rem; font-weight:700; cursor:pointer;">Yes, I'm 18+</button>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav>
    <div class="logo" style="color:#ff4477;">🔞 18+ Corner</div>
    <div class="nav-right">
      <a href="/adult-top.html" style="color:#00D4FF; font-size:0.82rem; text-decoration:none;">🏆 Top</a>
      <a href="/index.html" style="color:#00D4FF; font-size:0.82rem; text-decoration:none;">🎬 Main Site</a>
      <button class="logout-btn" onclick="toggleMenu()" style="font-size:1.1rem; padding:6px 10px;">☰</button>
    </div>

    <div id="dropMenu" style="display:none; position:absolute; top:70px; right:12px; background:#1C2333; border:1px solid #30363D; border-radius:12px; z-index:999; min-width:160px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div onclick="toggleGridMenu()" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#fff; cursor:pointer; border-bottom:1px solid #30363D; font-size:0.85rem;">🔲 Grid Size</div>
      <div id="gridSubMenu" style="display:none; background:#0D1117; padding:8px 16px; border-bottom:1px solid #30363D;">
        <div style="display:flex; gap:8px;">
          <button onclick="setGrid('2'); hideMenu();" class="grid-btn">2×3</button>
          <button onclick="setGrid('3'); hideMenu();" class="grid-btn">3×4</button>
          <button onclick="setGrid('4'); hideMenu();" class="grid-btn">4×5</button>
        </div>
      </div>
      <div onclick="logout()" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#ff6666; cursor:pointer; font-size:0.85rem;">🚪 Logout</div>
    </div>
  </nav>

  <!-- SEARCH -->
  <div style="padding:10px 12px; border-bottom:1px solid #30363D;">
    <div style="display:flex; align-items:center; gap:8px; background:#1C2333; border:1px solid #30363D; border-radius:999px; padding:8px 14px;">
      <span style="color:#8B949E;">🔍</span>
      <input type="text" id="searchInput" placeholder="Search videos..." oninput="searchVideos()"
        style="flex:1; background:none; border:none; color:#fff; font-size:0.85rem; outline:none;" />
      <span onclick="clearSearch()" style="color:#8B949E; cursor:pointer; font-size:0.85rem;">✕</span>
    </div>
  </div>

  <!-- CATEGORY FILTER -->
  <div id="filterBar" style="display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid #30363D; overflow-x:auto; scrollbar-width:none;">
    <button onclick="setCategory('All')" id="cat-All" class="grid-btn active">All</button>
    <button onclick="setCategory('Favorites')" id="cat-Favorites" class="grid-btn">❤️ Favorites</button>
    <button onclick="setCategory('Anime corn')" id="cat-Anime-corn" class="grid-btn">Anime corn</button>
    <button onclick="setCategory('NTR Anime corn')" id="cat-NTR-Anime-corn" class="grid-btn">NTR Anime corn</button>
    <button onclick="setCategory('Anime series corn')" id="cat-Anime-series-corn" class="grid-btn">Anime series corn</button>
    <button onclick="setCategory('Corn')" id="cat-Corn" class="grid-btn">Corn</button>
  </div>

  <!-- VIDEO PLAYER (hidden by default) -->
  <div id="playerSection" style="display:none;">
    <button class="back-btn" onclick="goBackAdult()">← Back to 18+ Corner</button>
    <div id="playerWrap" style="position:relative; background:#000;" onclick="onPlayerTap(event)">
      <video id="videoPlayer" playsinline></video>

      <button id="lockBtn" onclick="event.stopPropagation(); toggleLock()" style="position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:6px; padding:6px 8px; font-size:1rem; cursor:pointer; width:auto; z-index:20; display:none;">🔓</button>

      <div id="customControls" style="position:absolute; inset:0; z-index:10; opacity:1; transition:opacity 0.25s;">
        <div id="centerPlayBtn" onclick="event.stopPropagation(); togglePlay()" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:54px; height:54px; background:rgba(0,0,0,0.55); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; cursor:pointer;">▶️</div>

        <div style="position:absolute; top:8px; right:8px; display:flex; gap:6px;" onclick="event.stopPropagation()">
          <button onclick="toggleOrientation()" id="orientBtn" style="background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:6px; padding:6px 8px; font-size:0.95rem; cursor:pointer; width:auto;">🔄</button>
          <button onclick="cycleSpeed()" id="speedBtn" style="background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.3); color:#fff; border-radius:6px; padding:6px 8px; font-size:0.8rem; cursor:pointer; width:auto;">1.0x</button>
        </div>

        <div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent, rgba(0,0,0,0.75)); padding:24px 16px 12px;" onclick="event.stopPropagation()">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
            <span id="curTime" style="color:#fff; font-size:0.7rem; min-width:34px;">0:00</span>
            <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" style="flex:1; height:4px; accent-color:#ff4477;" oninput="onSeek(this.value)" />
            <span id="durTime" style="color:#fff; font-size:0.7rem; min-width:34px;">0:00</span>
          </div>
          <div style="display:flex; align-items:center; gap:14px;">
            <span onclick="togglePlay()" id="playPauseIcon" style="cursor:pointer; font-size:1.1rem;">▶️</span>
            <span onclick="skip(-10)" style="cursor:pointer; font-size:1rem;">⏪</span>
            <span onclick="skip(10)" style="cursor:pointer; font-size:1rem;">⏩</span>
            <span onclick="toggleMute()" id="volIcon" style="cursor:pointer; font-size:1rem;">🔊</span>
            <input type="range" id="volBar" min="0" max="1" value="1" step="0.05" style="width:50px; height:3px; accent-color:#ff4477;" oninput="onVolume(this.value)" />
            <span onclick="toggleFullscreen()" style="cursor:pointer; font-size:1.4rem; margin-left:auto; padding:8px 10px; margin-right:4px;">⛶</span>
          </div>
        </div>
      </div>
    </div>

    <div style="padding:16px;">
      <p class="player-title" id="playerTitle"></p>
      <div id="playerTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;"></div>
      <div id="likeBar" style="display:flex; gap:10px; margin-top:12px; align-items:center;"></div>

      <div id="episodeSection" style="display:none; margin-top:16px;">
        <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">📺 Episodes</p>
        <div id="episodeList"></div>
      </div>

      <!-- COMMENTS -->
      <div style="margin-top:16px;">
        <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">💬 Comments</p>
        <div style="display:flex; gap:8px; margin-bottom:14px;">
          <input type="text" id="commentInputAdult" placeholder="Add a comment..."
            style="flex:1; background:#1C2333; border:1px solid #30363D; border-radius:999px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none;" />
          <button onclick="postCommentAdult()" style="background:#ff4477; color:#000; border:none; border-radius:999px; padding:10px 18px; font-size:0.85rem; font-weight:700; cursor:pointer; width:auto;">Post</button>
        </div>
        <div id="commentListAdult"></div>
      </div>

      <p style="font-size:0.9rem; font-weight:700; margin-top:16px; margin-bottom:10px;">More like this</p>
      <div id="relatedVideosAdult" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
    </div>
  </div>

  <div id="gridSection">
    <div class="video-grid grid-2" id="videoGrid"></div>
    <div id="paginationBar" style="display:flex; justify-content:center; align-items:center; gap:6px; padding:16px; flex-wrap:wrap;"></div>
  </div>

  <script>
    (function() {
      const themes = {
        dark:       { bg:'#0D1117', card:'#1C2333', text:'#ffffff', border:'#30363D', muted:'#8B949E', accent:'#00D4FF' },
        light:      { bg:'#f0f2f5', card:'#ffffff', text:'#1a1a1a', border:'#dcdfe4', muted:'#6b7280', accent:'#0077ff' },
        neonred:    { bg:'#0D0508', card:'#1f0a10', text:'#ffe5e8', border:'#3D1018', muted:'#a87c82', accent:'#FF1744' },
        neonpink:   { bg:'#0D0510', card:'#1f0a1a', text:'#ffe5f5', border:'#3D1030', muted:'#a87c9c', accent:'#FF2D9E' },
        neongreen:  { bg:'#050D08', card:'#0a1f12', text:'#e5ffe9', border:'#103D1E', muted:'#7ca889', accent:'#00FF66' },
        neonviolet: { bg:'#0A050D', card:'#160a1f', text:'#f0e5ff', border:'#2A103D', muted:'#947ca8', accent:'#B026FF' }
      };
      const name = localStorage.getItem('theme') || 'dark';
      const t = themes[name];
      document.documentElement.style.setProperty('--bg', t.bg);
      document.documentElement.style.setProperty('--card', t.card);
      document.documentElement.style.setProperty('--text', t.text);
      document.documentElement.style.setProperty('--border', t.border);
      document.documentElement.style.setProperty('--muted', t.muted);
      document.documentElement.style.setProperty('--accent', t.accent);
      document.body.style.background = t.bg;
      document.body.style.color = t.text;
    })();

    const user = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!user) window.location.href = '/login.html';

    const token = sessionStorage.getItem('token');
    function authFetch(url, options) {
      options = options || {};
      options.headers = options.headers || {};
      options.headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, options);
    }

    // Re-check age verification every time this page loads
    if (sessionStorage.getItem('ageVerified') !== 'true') {
      document.getElementById('ageGateOverlay').style.display = 'flex';
    }

    function confirmAndStay() {
      sessionStorage.setItem('ageVerified', 'true');
      document.getElementById('ageGateOverlay').style.display = 'none';
    }

    const adultCategories = ['Anime corn', 'NTR Anime corn', 'Anime series corn', 'Corn'];
    let savedScrollYAdult = 0;
    let currentCategory = 'All';
    let allVideos = [];
    let allRatings = [];
    let allFavorites = [];

    let controlsHideTimer = null;
    let isLocked = false;
    const speedOptions = [1, 1.25, 1.5, 2, 0.5];
    let speedIndex = 0;
    let currentSeriesAdult = null;
    let currentEpIndexAdult = 0;

    function formatTime(sec) {
      if (!isFinite(sec) || sec < 0) sec = 0;
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function togglePlay() {
      const v = document.getElementById('videoPlayer');
      if (v.paused) { v.play(); } else { v.pause(); }
    }

    function skip(amount) {
      const v = document.getElementById('videoPlayer');
      v.currentTime = Math.min(Math.max(0, v.currentTime + amount), v.duration || 0);
      showControls();
    }

    function onSeek(value) {
      const v = document.getElementById('videoPlayer');
      if (v.duration) v.currentTime = (value / 100) * v.duration;
    }

    function onVolume(value) {
      const v = document.getElementById('videoPlayer');
      v.volume = value;
      document.getElementById('volIcon').textContent = value == 0 ? '🔇' : '🔊';
    }

    function toggleMute() {
      const v = document.getElementById('videoPlayer');
      v.muted = !v.muted;
      document.getElementById('volIcon').textContent = v.muted ? '🔇' : '🔊';
    }

    function toggleOrientation() {
      const wrap = document.getElementById('playerWrap');
      if (!document.fullscreenElement) {
        wrap.requestFullscreen().then(function() {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(function() {});
          }
        }).catch(function() {});
      } else {
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      }
    }

    function cycleSpeed() {
      speedIndex = (speedIndex + 1) % speedOptions.length;
      const v = document.getElementById('videoPlayer');
      v.playbackRate = speedOptions[speedIndex];
      document.getElementById('speedBtn').textContent = speedOptions[speedIndex] + 'x';
      showControls();
    }

    function toggleFullscreen() {
      const wrap = document.getElementById('playerWrap');
      if (!document.fullscreenElement) {
        wrap.requestFullscreen().catch(function() {});
      } else {
        document.exitFullscreen();
      }
    }

    function toggleLock() {
      isLocked = !isLocked;
      const lockBtn = document.getElementById('lockBtn');
      const controls = document.getElementById('customControls');
      lockBtn.textContent = isLocked ? '🔒' : '🔓';
      if (isLocked) {
        controls.classList.add('controls-hidden');
      } else {
        controls.classList.remove('controls-hidden');
        showControls();
      }
    }

    function onPlayerTap(e) {
      if (isLocked) {
        document.getElementById('lockBtn').style.display = 'block';
        clearTimeout(window._lockBtnTimer);
        window._lockBtnTimer = setTimeout(function() {
          document.getElementById('lockBtn').style.display = 'none';
        }, 2000);
        return;
      }
      const controls = document.getElementById('customControls');
      if (controls.classList.contains('controls-hidden')) {
        showControls();
      } else {
        hideControlsNow();
      }
    }

    function showControls() {
      if (isLocked) return;
      const controls = document.getElementById('customControls');
      controls.classList.remove('controls-hidden');
      document.getElementById('lockBtn').style.display = 'block';
      clearTimeout(controlsHideTimer);
      const v = document.getElementById('videoPlayer');
      if (!v.paused) {
        controlsHideTimer = setTimeout(hideControlsNow, 3000);
      }
    }

    function hideControlsNow() {
      if (isLocked) return;
      document.getElementById('customControls').classList.add('controls-hidden');
      document.getElementById('lockBtn').style.display = 'none';
    }

    function setupCustomPlayer() {
      const v = document.getElementById('videoPlayer');
      isLocked = false;
      document.getElementById('lockBtn').textContent = '🔓';
      document.getElementById('lockBtn').style.display = 'none';
      speedIndex = 0;
      v.playbackRate = 1;
      document.getElementById('speedBtn').textContent = '1.0x';
      document.getElementById('customControls').classList.remove('controls-hidden');

      v.onplay = function() {
        document.getElementById('playPauseIcon').textContent = '⏸️';
        document.getElementById('centerPlayBtn').style.display = 'none';
        showControls();
      };
      v.onpause = function() {
        document.getElementById('playPauseIcon').textContent = '▶️';
        document.getElementById('centerPlayBtn').style.display = 'flex';
        clearTimeout(controlsHideTimer);
      };
      v.ontimeupdate = function() {
        document.getElementById('curTime').textContent = formatTime(v.currentTime);
        if (v.duration) document.getElementById('seekBar').value = (v.currentTime / v.duration) * 100;
      };
      v.onloadedmetadata = function() {
        document.getElementById('durTime').textContent = formatTime(v.duration);
      };
      v.onvolumechange = function() {
        document.getElementById('volIcon').textContent = v.muted || v.volume == 0 ? '🔇' : '🔊';
      };
    }

    async function playVideoAdult(url, title, category, tags) {
      const videoEl = document.getElementById('videoPlayer');
      videoEl.src   = url;
      setupCustomPlayer();

      // Resume from last position
      const prog = allProgress.find(function(p) { return p.videoUrl === url; });
      if (prog && !prog.watched && prog.current > 10) {
        videoEl.addEventListener('loadedmetadata', function() {
          videoEl.currentTime = prog.current;
        }, { once: true });
      }

      // Save progress every 5 seconds
      if (window._progressTimerAdult) clearInterval(window._progressTimerAdult);
      window._progressTimerAdult = setInterval(async function() {
        if (videoEl.duration && videoEl.currentTime > 0) {
          const isWatched = (videoEl.currentTime / videoEl.duration) >= 0.9;
          await authFetch('/api/saveprogress', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ videoUrl: url, current: videoEl.currentTime, duration: videoEl.duration, watched: isWatched })
          });
          if (isWatched) {
            clearInterval(window._progressTimerAdult);
            loadVideos();
          }
        }
      }, 5000);
      document.getElementById('playerTitle').textContent = title;
      authFetch('/api/addview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoUrl: url })
      });

      const tagsBox = document.getElementById('playerTags');
      tagsBox.innerHTML = '';
      if (category) tagsBox.innerHTML += '<span style="background:#ff4477; color:#000; border-radius:4px; padding:3px 8px; font-size:0.75rem; font-weight:700;">' + category + '</span>';
      if (tags && tags.length) {
        tags.forEach(function(t) {
          tagsBox.innerHTML += '<span style="background:#1C2333; color:#8B949E; border:1px solid #30363D; border-radius:4px; padding:3px 8px; font-size:0.75rem;">#' + t + '</span>';
        });
      }

      const lRes = await fetch('/api/likes');
      const likes = await lRes.json();
      const videoLikes = likes.filter(function(l) { return l.videoUrl === url; });
      const likeCount = videoLikes.filter(function(l) { return l.action === 'like'; }).length;
      const disCount  = videoLikes.filter(function(l) { return l.action === 'dislike'; }).length;
      const myLike = likes.find(function(l) { return l.videoUrl === url && l.username === user.username; });
      const myRating = allRatings.find(function(r) { return r.videoUrl === url && r.username === user.username; });
      const isFav = allFavorites.includes(url);

      let playerStars = '';
      for (let s = 1; s <= 5; s++) {
        const color = myRating && myRating.rating >= s ? '#FFD700' : '#30363D';
        playerStars += '<span onclick="rateVideoAdult(\'' + url.replace(/'/g,"\\'") + '\',' + s + ')" style="cursor:pointer; font-size:1.3rem; color:' + color + ';">★</span>';
      }

      document.getElementById('likeBar').innerHTML =
        '<button onclick="toggleLikeAdult(\'' + url.replace(/'/g,"\\'") + '\',\'like\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'like' ? '#ff4477' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'like' ? '#ff4477' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👍 ' + likeCount + '</button>' +
        '<button onclick="toggleLikeAdult(\'' + url.replace(/'/g,"\\'") + '\',\'dislike\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👎 ' + disCount + '</button>' +
        '<span onclick="toggleFavAdult(\'' + url.replace(/'/g,"\\'") + '\')" style="cursor:pointer; font-size:1.3rem; margin-left:4px;">' + (isFav ? '❤️' : '🤍') + '</span>' +
        '<span style="display:flex; gap:2px; margin-left:8px;">' + playerStars + '</span>';

      document.getElementById('gridSection').style.display    = 'none';
      document.getElementById('filterBar').style.display      = 'none';
      document.getElementById('playerSection').style.display  = 'block';
      window.scrollTo(0, 0);

      window._currentVideoUrlAdult = url;
      loadCommentsAdult(url);

      // Related videos (same category, within adult section)
      const related = document.getElementById('relatedVideosAdult');
      related.innerHTML = '';
      const similar = allVideos.filter(function(v2) {
        const v2Id = v2.type === 'series' ? (v2.filename || v2.title) : v2.url;
        return v2Id !== url && v2.category === category;
      });
      if (similar.length === 0) {
        related.innerHTML = '<p style="color:#8B949E; font-size:0.78rem; grid-column:1/-1;">No similar videos found.</p>';
      } else {
        similar.forEach(function(v2) {
          const thumbStyle2 = v2.thumb ? 'background-image:url(' + v2.thumb + '); background-size:cover; background-position:center;' : '';
          const div = document.createElement('div');
          div.className = 'video-card';
          div.innerHTML = '<div class="thumbnail" style="' + thumbStyle2 + '"><div class="thumb-overlay"><div class="thumb-title">' + v2.title + '</div></div></div>';
          div.addEventListener('click', function() {
            if (v2.type === 'series') openSeriesAdult(v2);
            else playVideoAdult(v2.url, v2.title, v2.category, v2.tags);
          });
          related.appendChild(div);
        });
      }
    }

    function openSeriesAdult(v) {
      savedScrollYAdult = window.scrollY;
      currentSeriesAdult = v;
      currentEpIndexAdult = 0;
      playEpisodeAdult(0);
    }

    function playEpisodeAdult(idx) {
      currentEpIndexAdult = idx;
      const ep = currentSeriesAdult.episodes[idx];
      const epList = document.getElementById('episodeList');
      document.getElementById('episodeSection').style.display = 'block';
      epList.innerHTML = '';
      currentSeriesAdult.episodes.forEach(function(e, i) {
        const div = document.createElement('div');
        div.style.cssText = 'background:' + (i === idx ? '#3a1530' : '#1C2333') + '; border:1px solid ' + (i === idx ? '#ff4477' : '#30363D') + '; border-radius:8px; padding:10px 14px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:10px;';
        div.innerHTML = '<div style="width:26px; height:26px; background:' + (i === idx ? '#ff4477' : '#30363D') + '; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.72rem; font-weight:700; flex-shrink:0;">' + (i+1) + '</div><span style="font-size:0.82rem;">' + e.title + '</span>';
        div.addEventListener('click', function() { playEpisodeAdult(i); });
        epList.appendChild(div);
      });

      playVideoAdult(ep.url, currentSeriesAdult.title + ' — ' + ep.title, currentSeriesAdult.category, currentSeriesAdult.tags);

      const videoEl = document.getElementById('videoPlayer');
      videoEl.onended = function() {
        if (currentEpIndexAdult < currentSeriesAdult.episodes.length - 1) {
          playEpisodeAdult(currentEpIndexAdult + 1);
        }
      };
    }

    async function rateVideoAdult(videoUrl, star) {
      const myRating = allRatings.find(function(r) { return r.videoUrl === videoUrl && r.username === user.username; });
      if (myRating && myRating.rating === star) {
        await authFetch('/api/unratevideo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ videoUrl: videoUrl }) });
      } else {
        await authFetch('/api/ratevideo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ videoUrl: videoUrl, rating: star }) });
      }
      const rRes = await fetch('/api/ratings');
      allRatings = await rRes.json();
      const newMyRating = allRatings.find(function(r) { return r.videoUrl === videoUrl && r.username === user.username; });
      let starsHtml = '';
      for (let s = 1; s <= 5; s++) {
        const color = newMyRating && newMyRating.rating >= s ? '#FFD700' : '#30363D';
        starsHtml += '<span onclick="rateVideoAdult(\'' + videoUrl.replace(/'/g,"\\'") + '\',' + s + ')" style="cursor:pointer; font-size:1.3rem; color:' + color + ';">★</span>';
      }
      const starsBox = document.querySelector('#likeBar span[style*="margin-left:8px"]');
      if (starsBox) starsBox.innerHTML = starsHtml;
    }

    async function toggleFavAdult(videoUrl) {
      const res = await authFetch('/api/togglefavorite', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ videoUrl }) });
      const data = await res.json();
      if (data.favorited) { if (!allFavorites.includes(videoUrl)) allFavorites.push(videoUrl); }
      else { allFavorites = allFavorites.filter(function(u) { return u !== videoUrl; }); }
      const heart = document.querySelector('#likeBar span[onclick*="toggleFavAdult"]');
      if (heart) heart.textContent = data.favorited ? '❤️' : '🤍';
    }

    async function toggleLikeAdult(videoUrl, action) {
      await authFetch('/api/togglelike', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ videoUrl, action }) });
      const lRes = await fetch('/api/likes');
      const likes = await lRes.json();
      const videoLikes = likes.filter(function(l) { return l.videoUrl === videoUrl; });
      const likeCount = videoLikes.filter(function(l) { return l.action === 'like'; }).length;
      const disCount  = videoLikes.filter(function(l) { return l.action === 'dislike'; }).length;
      const myLike = likes.find(function(l) { return l.videoUrl === videoUrl && l.username === user.username; });
      const likeBarEl = document.getElementById('likeBar');
      const heart = likeBarEl.querySelector('span[onclick*="toggleFavAdult"]');
      const heartHtml = heart ? heart.outerHTML : '';
      const starsEl = likeBarEl.querySelector('span[style*="margin-left:8px"]');
      const starsHtml = starsEl ? starsEl.outerHTML : '';
      likeBarEl.innerHTML =
        '<button onclick="toggleLikeAdult(\'' + videoUrl.replace(/'/g,"\\'") + '\',\'like\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'like' ? '#ff4477' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'like' ? '#ff4477' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👍 ' + likeCount + '</button>' +
        '<button onclick="toggleLikeAdult(\'' + videoUrl.replace(/'/g,"\\'") + '\',\'dislike\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👎 ' + disCount + '</button>' +
        heartHtml + starsHtml;
    }

    function buildCommentRowAdult(c) {
      const isMine = c.username === user.username;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex; gap:10px; margin-bottom:14px;';
      div.innerHTML =
        '<div style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#ff4477,#aa0044); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0;">' + (c.avatar || '😀') + '</div>' +
        '<div style="flex:1;">' +
          '<div style="display:flex; align-items:center; gap:8px;">' +
            '<span style="font-size:0.82rem; font-weight:700;">' + c.username + '</span>' +
            '<span style="font-size:0.68rem; color:#8B949E;">' + c.time + '</span>' +
          '</div>' +
          '<div style="font-size:0.82rem; margin-top:2px;">' + c.text + '</div>' +
          (isMine ? '<button onclick="deleteCommentAdult(\'' + c.id + '\')" style="background:none; border:none; color:#ff6666; font-size:0.7rem; cursor:pointer; padding:0; margin-top:4px; width:auto;">🗑 Delete</button>' : '') +
        '</div>';
      return div;
    }

    async function loadCommentsAdult(videoUrl) {
      const res      = await fetch('/api/comments?videoUrl=' + encodeURIComponent(videoUrl));
      const comments = await res.json();
      const list     = document.getElementById('commentListAdult');
      list.innerHTML = '';
      if (comments.length === 0) {
        list.innerHTML = '<p style="color:#8B949E; font-size:0.8rem;">No comments yet. Be the first!</p>';
        return;
      }
      comments.forEach(function(c) { list.appendChild(buildCommentRowAdult(c)); });
    }

    async function postCommentAdult() {
      const input = document.getElementById('commentInputAdult');
      const text  = input.value.trim();
      if (!text) return;
      await authFetch('/api/addcomment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoUrl: window._currentVideoUrlAdult, avatar: user.avatar, text })
      });
      input.value = '';
      loadCommentsAdult(window._currentVideoUrlAdult);
    }

    async function deleteCommentAdult(id) {
      if (!confirm('Delete this comment?')) return;
      await authFetch('/api/deletecomment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      loadCommentsAdult(window._currentVideoUrlAdult);
    }

    function goBackAdult() {
      if (window._progressTimerAdult) clearInterval(window._progressTimerAdult);
      const videoEl = document.getElementById('videoPlayer');
      videoEl.pause();
      videoEl.onended = null;
      videoEl.onplay  = null;
      videoEl.onpause = null;
      videoEl.src     = '';
      document.getElementById('playerSection').style.display  = 'none';
      document.getElementById('episodeSection').style.display = 'none';
      document.getElementById('gridSection').style.display    = 'block';
      document.getElementById('filterBar').style.display      = 'flex';
      currentSeriesAdult = null;
      setTimeout(function() {
        window.scrollTo(0, savedScrollYAdult);
      }, 10);
    }
 
    let allProgress = [];

    async function loadVideos() {
      const res     = await fetch('/api/videos');
      const all     = await res.json();
      allVideos     = all.filter(v => adultCategories.includes(v.category));
      const rRes    = await fetch('/api/ratings');
      allRatings    = await rRes.json();
      const fRes    = await fetch('/api/favorites?username=' + user.username);
      const favData = await fRes.json();
      allFavorites  = favData.map(f => f.videoUrl);
      const pRes    = await fetch('/api/progress?username=' + user.username);
      allProgress   = await pRes.json();
      renderVideos();
    }

    let currentPageAdult = 1;
    const perPageAdult = 20;

    function renderVideos() {
      const grid = document.getElementById('videoGrid');
      const filtered = currentCategory === 'All'
        ? allVideos
        : currentCategory === 'Favorites'
        ? allVideos.filter(v => allFavorites.includes(v.type === 'series' ? (v.filename || v.title) : v.url))
        : allVideos.filter(v => v.category === currentCategory);

      if (filtered.length === 0) {
        grid.innerHTML = '<p style="color:#8B949E; padding:16px; grid-column:1/-1;">No videos in this category.</p>';
        document.getElementById('paginationBar').innerHTML = '';
        return;
      }

      const totalPagesAdult = Math.ceil(filtered.length / perPageAdult);
      if (currentPageAdult > totalPagesAdult) currentPageAdult = 1;
      const startAdult = (currentPageAdult - 1) * perPageAdult;
      const paged = filtered.slice(startAdult, startAdult + perPageAdult);

      grid.innerHTML = '';
      paged.forEach(function(v) {
        const videoUrl = v.type === 'series' ? (v.filename || v.title) : (v.url || '');
        const videoRatings = allRatings.filter(function(r) { return r.videoUrl === videoUrl; });
        const avg = videoRatings.length
          ? (videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length).toFixed(1)
          : null;

        let stars = '';
        const fullStars = avg ? Math.round(avg) : 0;
        for (let s = 1; s <= 5; s++) {
          stars += '<span class="rate-star" style="color:' + (s <= fullStars ? '#FFD700' : '#30363D') + ';">★</span>';
        }

        const isFav = allFavorites.includes(videoUrl);
        const thumbStyle = v.thumb ? 'background-image:url(' + v.thumb + '); background-size:cover; background-position:center;' : '';
        const prog    = allProgress.find(function(p) { return p.videoUrl === videoUrl; });
        const watched = prog && prog.watched;
        const continu = prog && !prog.watched && prog.current > 0;
        const pct     = prog && prog.duration > 0 ? (prog.current / prog.duration * 100).toFixed(0) : 0;

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML =
          '<div class="thumbnail" style="' + thumbStyle + '">' +
            (watched ? '<div class="thumb-badge" style="background:#00dd66; color:#000;">✓ Watched</div>' :
             continu ? '<div class="thumb-badge" style="background:#FFD700; color:#000;">▶ Continue</div>' :
             v.type === 'series' ? '<div class="thumb-badge">📺 ' + (v.episodes ? v.episodes.length : 0) + ' Eps</div>' : '<div class="thumb-badge">▶</div>') +
            '<div class="thumb-category" style="background:#ff4477;">' + v.category + '</div>' +
            '<div class="thumb-overlay">' +
              '<div style="display:flex; justify-content:space-between; align-items:flex-start;">' +
                '<div class="thumb-title" style="flex:1;">' + v.title + '</div>' +
                '<span class="fav-heart" style="cursor:default;">' + (isFav ? '❤️' : '🤍') + '</span>' +
              '</div>' +
              '<div style="display:flex; gap:2px; margin-top:4px;">' + stars + '</div>' +
              (continu ? '<div style="background:rgba(0,0,0,0.5); border-radius:999px; height:4px; margin-top:6px; overflow:hidden;"><div style="background:#ff4477; height:100%; width:' + pct + '%;"></div></div>' : '') +
            '</div>' +
          '</div>';

        card.addEventListener('click', function() {
          savedScrollYAdult = window.scrollY;
          if (v.type === 'series') openSeriesAdult(v);
          else playVideoAdult(v.url, v.title, v.category, v.tags);
        });

        grid.appendChild(card);
      });

      renderPaginationAdult(totalPagesAdult);
    }

    function renderPaginationAdult(totalPages) {
      const bar = document.getElementById('paginationBar');
      bar.innerHTML = '';
      if (totalPages <= 1) return;

      function makeBtn(label, page, isActive, isDisabled) {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.className = 'grid-btn' + (isActive ? ' active' : '');
        btn.style.opacity = isDisabled ? '0.4' : '1';
        btn.style.minWidth = '36px';
        if (!isDisabled) {
          btn.addEventListener('click', function() {
            currentPageAdult = page;
            window.scrollTo(0, 0);
            renderVideos();
          });
        }
        return btn;
      }

      bar.appendChild(makeBtn('‹', currentPageAdult - 1, false, currentPageAdult === 1));

      const maxButtons = 5;
      let startPage = Math.max(1, currentPageAdult - Math.floor(maxButtons / 2));
      let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
      if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

      if (startPage > 1) {
        bar.appendChild(makeBtn('1', 1, currentPageAdult === 1));
        if (startPage > 2) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.color = '#8B949E';
          bar.appendChild(dots);
        }
      }

      for (let p = startPage; p <= endPage; p++) {
        bar.appendChild(makeBtn(String(p), p, p === currentPageAdult));
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.color = '#8B949E';
          bar.appendChild(dots);
        }
        bar.appendChild(makeBtn(String(totalPages), totalPages, currentPageAdult === totalPages));
      }

      bar.appendChild(makeBtn('›', currentPageAdult + 1, false, currentPageAdult === totalPages));
    }

    function setCategory(cat) {
      currentCategory = cat;
      currentPageAdult = 1;
      document.querySelectorAll('[id^="cat-"]').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('cat-' + cat.replace(/ /g, '-'));
      if (btn) btn.classList.add('active');
      renderVideos();
    }

    function searchVideos() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!q) { renderVideos(); return; }
      const filtered = allVideos.filter(v => v.title.toLowerCase().includes(q));
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = '';
      filtered.forEach(function(v) {
        const thumbStyle = v.thumb ? 'background-image:url(' + v.thumb + '); background-size:cover; background-position:center;' : '';
        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = '<div class="thumbnail" style="' + thumbStyle + '"><div class="thumb-overlay"><div class="thumb-title">' + v.title + '</div></div></div>';
        card.addEventListener('click', function() {
          sessionStorage.setItem('jumpToVideo', JSON.stringify(v));
          window.location.href = '/index.html';
        });
        grid.appendChild(card);
      });
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderVideos();
    }

    function setGrid(size) {
      const grid = document.getElementById('videoGrid');
      if (grid) {
        grid.className = 'video-grid grid-' + size;
        localStorage.setItem('gridSize', size);
      }
    }

    function toggleMenu() {
      const menu = document.getElementById('dropMenu');
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    function hideMenu() {
      document.getElementById('dropMenu').style.display = 'none';
      document.getElementById('gridSubMenu').style.display = 'none';
    }

    function toggleGridMenu() {
      const sub = document.getElementById('gridSubMenu');
      sub.style.display = sub.style.display === 'none' ? 'block' : 'none';
    }

    document.addEventListener('click', function(e) {
      const menu = document.getElementById('dropMenu');
      const btn  = document.querySelector('.logout-btn');
      if (menu && btn && !menu.contains(e.target) && e.target !== btn) {
        hideMenu();
      }
    });

    function logout() {
      authFetch('/api/logout', { method: 'POST' }).catch(function() {});
      sessionStorage.removeItem('user');
      sessionStorage.removeItem('token');
      window.location.href = '/login.html';
    }

    const savedGrid = localStorage.getItem('gridSize') || '2';
    setGrid(savedGrid);

    loadVideos();
  </script>
  </script>

</body>
