<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <nav>
    <div class="logo">🌽 AnimeCorn</div>
    <div class="nav-right">
      <img src="https://media.tenor.com/mP0SLXgz71QAAAAj/peachcat-cat.gif" style="width:50px; height:50px; border-radius:10px; object-fit:cover;" />
      <a href="/chat.html" style="color:#00D4FF; font-size:0.82rem; text-decoration:none;">💬 Chat</a>
      <button class="logout-btn" onclick="toggleMenu()" style="font-size:1.1rem; padding:6px 10px;">☰</button>
    </div>

    <div id="dropMenu" style="display:none; position:absolute; top:70px; right:12px; background:#1C2333; border:1px solid #30363D; border-radius:12px; z-index:999; min-width:160px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <a href="/profile.html" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#fff; text-decoration:none; border-bottom:1px solid #30363D; font-size:0.85rem;">👤 Profile</a>
      <a href="/users.html" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#fff; text-decoration:none; border-bottom:1px solid #30363D; font-size:0.85rem;">👥 Users</a>
      <div onclick="toggleGridMenu()" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#fff; cursor:pointer; border-bottom:1px solid #30363D; font-size:0.85rem;">🔲 Grid Size</div>
      <div id="gridSubMenu" style="display:none; background:#0D1117; padding:8px 16px; border-bottom:1px solid #30363D;">
        <div style="display:flex; gap:8px;">
          <button onclick="setGrid('2'); hideMenu();" class="grid-btn">2×3</button>
          <button onclick="setGrid('3'); hideMenu();" class="grid-btn">3×4</button>
          <button onclick="setGrid('4'); hideMenu();" class="grid-btn">4×5</button>
        </div>
      </div>
      <a href="/settings.html" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#fff; text-decoration:none; font-size:0.85rem;">⚙️ Settings</a>
      <div onclick="logout()" style="display:flex; align-items:center; gap:10px; padding:12px 16px; color:#ff6666; cursor:pointer; font-size:0.85rem;">🚪 Logout</div>
    </div>
  </nav>

  <!-- VIDEO PLAYER (hidden by default) -->
  <div id="playerSection" style="display:none;">
    <button class="back-btn" onclick="goBack()">← Back to videos</button>
    <div class="player-wrap">
      <video id="videoPlayer" controls></video>
      <p class="player-title" id="playerTitle"></p>
      <div id="playerTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;"></div>
      <div id="likeBar" style="display:flex; gap:10px; margin-top:12px;"></div>

      <!-- EPISODES LIST -->
      <div id="episodeSection" style="display:none; margin-top:16px;">
        <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">📺 Episodes</p>
        <div id="episodeList"></div>
      </div>

      <!-- COMMENTS -->
      <div style="margin-top:16px;">
        <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">💬 Comments</p>
        <div style="display:flex; gap:8px; margin-bottom:14px;">
          <input type="text" id="commentInput" placeholder="Add a comment..."
            style="flex:1; background:#1C2333; border:1px solid #30363D; border-radius:999px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none;" />
          <button onclick="postComment()" style="background:#00D4FF; color:#000; border:none; border-radius:999px; padding:10px 18px; font-size:0.85rem; font-weight:700; cursor:pointer; width:auto;">Post</button>
        </div>
        <div id="commentList"></div>
      </div>

      <p style="font-size:0.9rem; font-weight:700; margin-top:16px; margin-bottom:10px;">More like this</p>
      <div id="relatedVideos" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
    </div>
  </div>

  <!-- SERIES EPISODE PICKER (hidden by default) -->
  <div id="seriesSection" style="display:none;">
    <button class="back-btn" onclick="goBack()">← Back to videos</button>
    <div style="padding:16px;">
      <p id="seriesTitle" style="font-size:1.1rem; font-weight:700; margin-bottom:10px;"></p>
      <div id="seriesFavBox" style="margin-bottom:10px;"></div>
      <div id="seriesRatingBox" style="margin-bottom:14px;"></div>

      <div id="seriesTags" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;"></div>

      <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">📺 Episodes</p>
      <div id="seriesEpisodes"></div>

      <!-- COMMENTS -->
      <div style="margin-top:16px;">
        <p style="font-size:0.9rem; font-weight:700; margin-bottom:10px;">💬 Comments</p>
        <div style="display:flex; gap:8px; margin-bottom:14px;">
          <input type="text" id="seriesCommentInput" placeholder="Add a comment..."
            style="flex:1; background:#1C2333; border:1px solid #30363D; border-radius:999px; padding:10px 14px; color:#fff; font-size:0.85rem; outline:none;" />
          <button onclick="postSeriesComment()" style="background:#00D4FF; color:#000; border:none; border-radius:999px; padding:10px 18px; font-size:0.85rem; font-weight:700; cursor:pointer; width:auto;">Post</button>
        </div>
        <div id="seriesCommentList"></div>
      </div>

      <p style="font-size:0.9rem; font-weight:700; margin-top:16px; margin-bottom:10px;">More like this</p>
      <div id="seriesMore" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;"></div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div style="padding:10px 12px; border-bottom:1px solid #30363D;">
    <div style="display:flex; align-items:center; gap:8px; background:#1C2333; border:1px solid #30363D; border-radius:999px; padding:8px 14px;">
      <span style="color:#8B949E;">🔍</span>
      <input type="text" id="searchInput" placeholder="Search videos..." oninput="searchVideos()"
        style="flex:1; background:none; border:none; color:#fff; font-size:0.85rem; outline:none;" />
      <span onclick="clearSearch()" style="color:#8B949E; cursor:pointer; font-size:0.85rem;">✕</span>
    </div>
  </div>

  <div id="filterBar" style="display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid #30363D; overflow-x:auto; scrollbar-width:none;">
    <button onclick="setCategory('All')" id="cat-All" class="grid-btn active">All</button>
    <button onclick="setCategory('Favorites')" id="cat-Favorites" class="grid-btn">❤️ Favorites</button>
    <button onclick="setCategory('Anime')" id="cat-Anime" class="grid-btn">Anime</button>
    <button onclick="setCategory('NTR Anime corn')" id="cat-NTR-Anime-corn" class="grid-btn">NTR Anime corn</button>
    <button onclick="setCategory('Anime corn')" id="cat-Anime-corn" class="grid-btn">Anime corn</button>
    <button onclick="setCategory('Anime series corn')" id="cat-Anime-series-corn" class="grid-btn">Anime series corn</button>
    <button onclick="setCategory('Corn')" id="cat-Corn" class="grid-btn">Corn</button>
  </div>


  <!-- TOP & LEAST RATED -->
  <div id="ratedSection" style="padding:12px 12px 0;">

    <!-- TOP RATED -->
    <div style="margin-bottom:14px;">
      <p style="font-size:0.88rem; font-weight:700; margin-bottom:8px;">🏆 Top Rated</p>
      <div id="topRatedRow" style="display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;"></div>
    </div>

    <!-- LEAST RATED -->
    <div style="margin-bottom:14px;">
      <p style="font-size:0.88rem; font-weight:700; margin-bottom:8px;">💔 Least Rated</p>
      <div id="leastRatedRow" style="display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;"></div>
    </div>

  </div>

  <div id="gridSection">
    <div class="video-grid grid-2" id="videoGrid"></div>
    <div id="paginationBar" style="display:flex; justify-content:center; align-items:center; gap:6px; padding:16px; flex-wrap:wrap;"></div>
  </div>

  <script>
    // Apply saved theme on load
    (function() {
      const themes = {
        dark:       { bg:'#0D1117', card:'#1C2333', text:'#ffffff', border:'#30363D', muted:'#8B949E', accent:'#00D4FF' },
        light:      { bg:'#f0f2f5', card:'#ffffff', text:'#1a1a1a', border:'#dcdfe4', muted:'#6b7280', accent:'#0077ff' },
        neonred:    { bg:'#0D0508', card:'#1f0a10', text:'#ffe5e8', border:'#3D1018', muted:'#a87c82', accent:'#FF1744' },
        neonpink:   { bg:'#0D0510', card:'#1f0a1a', text:'#ffe5f5', border:'#3D1030', muted:'#a87c9c', accent:'#FF2D9E' },
        neongreen:  { bg:'#050D08', card:'#0a1f12', text:'#e5ffe9', border:'#103D1E', muted:'#7ca889', accent:'#00FF66' },
        neonviolet: { bg:'#0A050D', card:'#160a1f', text:'#f0e5ff', border:'#2A103D', muted:'#947ca8', accent:'#B026FF' }
      };
      const name = localStorage.getItem('theme') || 'dark';
      const t = themes[name];
      document.documentElement.style.setProperty('--bg',     t.bg);
      document.documentElement.style.setProperty('--card',   t.card);
      document.documentElement.style.setProperty('--text',   t.text);
      document.documentElement.style.setProperty('--border', t.border);
      document.documentElement.style.setProperty('--muted',  t.muted);
      document.documentElement.style.setProperty('--accent', t.accent);
      document.body.style.background = t.bg;
      document.body.style.color      = t.text;
    })();

    const user = JSON.parse(sessionStorage.getItem('user') || 'null');
    if (!user) window.location.href = '/login.html';

    let currentCategory = 'All';
    let savedScrollY = 0;
    let currentPage  = 1;
    const perPage    = 20;
    let allVideos = [];
    let allRatings = [];
    let allProgress = [];
    let allFavorites = [];
    let allLikes = [];

    async function loadVideos() {
      const res     = await fetch('/api/videos');
      allVideos     = await res.json();
      const rRes    = await fetch('/api/ratings');
      allRatings    = await rRes.json();
      const pRes    = await fetch('/api/progress?username=' + user.username);
      allProgress   = await pRes.json();
      const fRes    = await fetch('/api/favorites?username=' + user.username);
      const favData = await fRes.json();
      allFavorites  = favData.map(f => f.videoUrl);
      const lRes    = await fetch('/api/likes');
      allLikes      = await lRes.json();
      renderVideos();
    }

    function renderVideos() {
      renderRatedRows();
      const grid = document.getElementById('videoGrid');

      const filtered = currentCategory === 'All' ? allVideos
        : currentCategory === 'Favorites'
        ? allVideos.filter(v => allFavorites.includes(v.url || ''))
        : allVideos.filter(v =>
            v.category === currentCategory ||
            (v.tags && v.tags.some(t => t.toLowerCase() === currentCategory.toLowerCase()))
          );

      if (filtered.length === 0) {
        grid.innerHTML = '<p style="color:#8B949E; padding:16px; grid-column:1/-1;">No videos in this category.</p>';
        document.getElementById('paginationBar').innerHTML = '';
        return;
      }

      const totalPages = Math.ceil(filtered.length / perPage);
      if (currentPage > totalPages) currentPage = 1;
      const start  = (currentPage - 1) * perPage;
      const paged  = filtered.slice(start, start + perPage);

      grid.innerHTML = '';
      window._videos = paged;

      paged.forEach(function(v) {
        const videoUrl     = v.url || '';
        const videoRatings = allRatings.filter(function(r) { return r.videoUrl === videoUrl; });
        const avg = videoRatings.length
          ? (videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length).toFixed(1)
          : null;
        const myRating = allRatings.find(function(r) { return r.videoUrl === videoUrl && r.username === user.username; });

        let stars = '';
        if (v.type !== 'series') {
          for (let s = 1; s <= 5; s++) {
            const color   = myRating && myRating.rating >= s ? '#FFD700' : '#30363D';
            const safeUrl = videoUrl.replace(/'/g, "\\'");
            stars += '<span class="rate-star" onclick="event.stopPropagation(); rateVideo(\'' + safeUrl + '\',' + s + ')" style="color:' + color + '; cursor:pointer;">★</span>';
          }
        }

        const card = document.createElement('div');
        card.className = 'video-card';
        const thumbStyle = v.thumb
          ? 'background-image:url(' + v.thumb + '); background-size:cover; background-position:center;'
          : '';
        const prog     = allProgress.find(function(p) { return p.videoUrl === videoUrl; });
        const isFav    = allFavorites.includes(videoUrl);
        const watched  = prog && prog.watched;
        const continu  = prog && !prog.watched && prog.current > 0;
        const pct      = prog && prog.duration > 0 ? (prog.current / prog.duration * 100).toFixed(0) : 0;

        // Generate Tag badges if they exist for the video block array
        let tagBadgesHtml = '';
        if (v.tags && v.tags.length > 0) {
          tagBadgesHtml += '<div class="thumb-tags" style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">';
          v.tags.forEach(function(t) {
            tagBadgesHtml += '<span style="font-size:0.65rem; background:rgba(0,0,0,0.6); color:#8B949E; padding:2px 6px; border-radius:4px;">#' + t + '</span>';
          });
          tagBadgesHtml += '</div>';
        }

        card.innerHTML =
          '<div class="thumbnail" style="' + thumbStyle + '">' +
           (watched ? '<div class="thumb-badge" style="background:#00dd66; color:#000;">✓ Watched</div>' :
            continu ? '<div class="thumb-badge" style="background:#FFD700; color:#000;">▶ Continue</div>' :
            v.type === 'series' ? '<div class="thumb-badge">📺 ' + (v.episodes ? v.episodes.length : 0) + ' Eps</div>' :
            avg ? '<div class="thumb-badge">★ ' + avg + '</div>' : '<div class="thumb-badge">▶</div>') +
           (v.category ? '<div class="thumb-category">' + v.category + '</div>' : '') +
           '<div class="thumb-overlay">' +
             '<div style="display:flex; justify-content:space-between; align-items:flex-start;">' +
               '<div class="thumb-title" style="flex:1;">' + v.title + '</div>' +
               '<span class="fav-heart" onclick="event.stopPropagation(); toggleFav(\'' + videoUrl.replace(/'/g,"\\'") + '\')" style="cursor:pointer;">' + (isFav ? '❤️' : '🤍') + '</span>' +
             '</div>' +
             (v.type !== 'series' ? '<div style="display:flex; gap:2px; margin-top:4px;">' + stars + '</div>' : '') +
             tagBadgesHtml + // Safe insertion of dynamic loop tags layout markup
             (continu ? '<div style="background:rgba(0,0,0,0.5); border-radius:999px; height:4px; margin-top:6px; overflow:hidden;"><div style="background:#FFD700; width:' + pct + '%; height:100%;"></div></div>' : '') +
           '</div>' +
         '</div>';

        card.addEventListener('click', function() {
          if (v.type === 'series') {
            openSeries(v);
          } else {
            playVideo(v.url, v.title, v.category, v.tags);
          }
        });

        grid.appendChild(card);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const bar = document.getElementById('paginationBar');
      bar.innerHTML = '';
      if (totalPages <= 1) return;

      function makeBtn(label, page, isActive, isDisabled) {
        const btn = document.createElement('button');
        btn.textContent = label;
        btn.className = 'grid-btn' + (isActive ? ' active' : '');
        btn.style.opacity = isDisabled ? '0.4' : '1';
        btn.style.minWidth = '36px';
        if (!isDisabled) {
          btn.addEventListener('click', function() {
            currentPage = page;
            window.scrollTo(0, 0);
            renderVideos();
          });
        }
        return btn;
      }

      bar.appendChild(makeBtn('‹', currentPage - 1, false, currentPage === 1));

      const maxButtons = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
      let endPage   = Math.min(totalPages, startPage + maxButtons - 1);
      if (endPage - startPage < maxButtons - 1) startPage = Math.max(1, endPage - maxButtons + 1);

      if (startPage > 1) {
        bar.appendChild(makeBtn('1', 1, currentPage === 1));
        if (startPage > 2) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.color = '#8B949E';
          bar.appendChild(dots);
        }
      }

      for (let p = startPage; p <= endPage; p++) {
        bar.appendChild(makeBtn(String(p), p, p === currentPage));
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          const dots = document.createElement('span');
          dots.textContent = '...';
          dots.style.color = '#8B949E';
          bar.appendChild(dots);
        }
        bar.appendChild(makeBtn(String(totalPages), totalPages, currentPage === totalPages));
      }

      bar.appendChild(makeBtn('›', currentPage + 1, false, currentPage === totalPages));
    }

    function setCategory(cat) {
      currentCategory = cat;
      currentPage = 1;
      document.querySelectorAll('[id^="cat-"]').forEach(b => b.classList.remove('active'));
      const btn = document.getElementById('cat-' + cat.replace(/ /g, '-'));
      if (btn) btn.classList.add('active');
      renderVideos();
    }

    async function rateVideo(videoUrl, star) {
      const rRes      = await fetch('/api/ratings');
      const ratings   = await rRes.json();
      const myRating  = ratings.find(r => r.videoUrl === videoUrl && r.username === user.username);

      // If tapping the same star, unrate it
      if (myRating && myRating.rating === star) {
        await fetch('/api/unratevideo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user.username, videoUrl: videoUrl })
        });
      } else {
        await fetch('/api/ratevideo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user.username, videoUrl: videoUrl, rating: star })
        });
      }

      // Refresh ratings data
      const newRes = await fetch('/api/ratings');
      allRatings   = await newRes.json();

      // If a series page is currently open, refresh its rating display
      if (currentSeries && document.getElementById('seriesSection').style.display === 'block') {
        const seriesRatingBox = document.getElementById('seriesRatingBox');
        const videoRatings    = allRatings.filter(function(r) { return r.videoUrl === videoUrl; });
        const avg             = videoRatings.length ? (videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length).toFixed(1) : null;
        const newMyRating     = allRatings.find(function(r) { return r.videoUrl === videoUrl && r.username === user.username; });
        let starsHtml = '';
        for (let s = 1; s <= 5; s++) {
          const color = newMyRating && newMyRating.rating >= s ? '#FFD700' : '#30363D';
          starsHtml += '<span onclick="rateVideo(\'' + videoUrl.replace(/'/g,"\\'") + '\',' + s + ')" style="cursor:pointer; font-size:1.4rem; color:' + color + ';">★</span>';
        }
        seriesRatingBox.innerHTML = '<div style="display:flex; align-items:center; gap:8px;">' + starsHtml + (avg ? '<span style="color:#8B949E; font-size:0.8rem;">' + avg + ' / 5</span>' : '') + '</div>';
        renderRatedRows();
      } else {
        loadVideos();
      }
    }

    async function playVideo(url, title, category, tags) {
      savedScrollY = window.scrollY;
      const videoEl = document.getElementById('videoPlayer');
      videoEl.src   = url;
      window._currentVideoUrl = url;
      document.getElementById('playerTitle').textContent = title;

      // Refresh likes data fresh for this video (guard against stale fetch)
      const lRes = await fetch('/api/likes');
      const freshLikes = await lRes.json();
      if (window._currentVideoUrl !== url) return; // a newer playVideo call has taken over
      allLikes = freshLikes;

      // Resume from last position
      const prog = allProgress.find(function(p) { return p.videoUrl === url; });
      if (prog && !prog.watched && prog.current > 10) {
        videoEl.addEventListener('loadedmetadata', function() {
          videoEl.currentTime = prog.current;
        }, { once: true });
      }

      // Save progress every 5 seconds
      if (window._progressTimer) clearInterval(window._progressTimer);
      window._progressTimer = setInterval(async function() {
        if (videoEl.duration && videoEl.currentTime > 0) {
          const isWatched = (videoEl.currentTime / videoEl.duration) >= 0.9;
          await fetch('/api/saveprogress', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: user.username,
              videoUrl: url,
              current:  videoEl.currentTime,
              duration: videoEl.duration,
              watched:  isWatched
            })
          });
          if (isWatched) {
            clearInterval(window._progressTimer);
            loadVideos();
          }
        }
      }, 5000);

      document.getElementById('playerSection').style.display = 'block';
      document.getElementById('gridSection').style.display  = 'none';
      document.getElementById('filterBar').style.display    = 'none';
      document.getElementById('ratedSection').style.display = 'none';

      // Show tags
      const tagsBox = document.getElementById('playerTags');
      tagsBox.innerHTML = '';
      if (category) {
        tagsBox.innerHTML += '<span style="background:#00D4FF; color:#000; border-radius:4px; padding:3px 8px; font-size:0.75rem; font-weight:700;">' + category + '</span>';
      }
      if (tags && tags.length) {
        tags.forEach(t => {
          tagsBox.innerHTML += '<span style="background:#1C2333; color:#8B949E; border:1px solid #30363D; border-radius:4px; padding:3px 8px; font-size:0.75rem;">#' + t + '</span>';
        });
      }

      window.scrollTo(0, 0);

      // Show like dislike
      const likeBar    = document.getElementById('likeBar');
      const videoLikes = allLikes.filter(function(l) { return l.videoUrl === url; });
      const likeCount  = videoLikes.filter(function(l) { return l.action === 'like'; }).length;
      const disCount   = videoLikes.filter(function(l) { return l.action === 'dislike'; }).length;
      const myLike     = allLikes.find(function(l) { return l.videoUrl === url && l.username === user.username; });

      likeBar.innerHTML =
        '<button onclick="toggleLike(\'' + url.replace(/'/g,"\\'") + '\',\'like\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'like' ? '#00D4FF' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'like' ? '#00D4FF' : '#30363D') + '; color:' + (myLike && myLike.action === 'like' ? '#000' : '#fff') + '; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👍 ' + likeCount + '</button>' +
        '<button onclick="toggleLike(\'' + url.replace(/'/g,"\\'") + '\',\'dislike\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👎 ' + disCount + '</button>';

      // Show related videos
      const related  = document.getElementById('relatedVideos');
      related.innerHTML = '';
      const similar = allVideos.filter(v2 => v2.url !== url && v2.category === category);
      if (similar.length === 0) {
        related.innerHTML = '<p style="color:#8B949E; font-size:0.78rem; grid-column:1/-1;">No similar videos found.</p>';
      } else {
        similar.forEach(v2 => {
          const thumbStyle = v2.thumb
            ? 'background-image:url(' + v2.thumb + '); background-size:cover; background-position:center;'
            : '';
          const div = document.createElement('div');
          div.className = 'video-card';
          div.innerHTML =
            '<div class="thumbnail" style="' + thumbStyle + '">' +
              '<div class="thumb-overlay">' +
                '<div class="thumb-title">' + v2.title + '</div>' +
              '</div>' +
            '</div>';
          div.addEventListener('click', function() {
            playVideo(v2.url, v2.title, v2.category, v2.tags);
          });
          related.appendChild(div);
        });
      }
      loadComments(url, 'commentList');
    }

    let currentSeries   = null;
    let currentEpIndex  = 0;

    function openSeries(v) {
      currentSeries  = v;
      currentEpIndex = 0;
      savedScrollY = window.scrollY;
      window.scrollTo(0, 0);
      window._currentSeriesId = v.filename || v.title;
      document.getElementById('gridSection').style.display   = 'none';
      document.getElementById('filterBar').style.display     = 'none';
      document.getElementById('seriesSection').style.display = 'block';
      document.getElementById('seriesTitle').textContent     = v.title;

      // Favorite button
      const seriesFavBox = document.getElementById('seriesFavBox');
      const isFav = allFavorites.includes(v.filename || v.title);
      seriesFavBox.innerHTML = '<button onclick="toggleFav(\'' + (v.filename || v.title) + '\')" style="background:#1C2333; border:1px solid #30363D; border-radius:8px; padding:8px 16px; color:#fff; font-size:0.85rem; cursor:pointer; width:auto;">' + (isFav ? '❤️ Favorited' : '🤍 Favorite') + '</button>';

      // Rating
      const seriesRatingBox = document.getElementById('seriesRatingBox');
      const videoRatings    = allRatings.filter(function(r) { return r.videoUrl === (v.filename || v.title); });
      const avg             = videoRatings.length ? (videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length).toFixed(1) : null;
      const myRating        = allRatings.find(function(r) { return r.videoUrl === (v.filename || v.title) && r.username === user.username; });
      let starsHtml = '';
      for (let s = 1; s <= 5; s++) {
        const color = myRating && myRating.rating >= s ? '#FFD700' : '#30363D';
        starsHtml += '<span onclick="rateVideo(\'' + (v.filename || v.title) + '\',' + s + ')" style="cursor:pointer; font-size:1.4rem; color:' + color + ';">★</span>';
      }
      seriesRatingBox.innerHTML = '<div style="display:flex; align-items:center; gap:8px;">' + starsHtml + (avg ? '<span style="color:#8B949E; font-size:0.8rem;">' + avg + ' / 5</span>' : '') + '</div>';

      // --- FIXED: Inject Series Category and Tag Badges ---
      const seriesTagsBox = document.getElementById('seriesTags');
      seriesTagsBox.innerHTML = '';
      if (v.category) {
        seriesTagsBox.innerHTML += '<span style="background:#00D4FF; color:#000; border-radius:4px; padding:3px 8px; font-size:0.75rem; font-weight:700;">' + v.category + '</span>';
      }
      if (v.tags && v.tags.length) {
        v.tags.forEach(t => {
          seriesTagsBox.innerHTML += '<span style="background:#1C2333; color:#8B949E; border:1px solid #30363D; border-radius:4px; padding:3px 8px; font-size:0.75rem;">#' + t + '</span>';
        });
      }

      // Episodes
      const epList = document.getElementById('seriesEpisodes');
      epList.innerHTML = '';
      v.episodes.forEach(function(ep, idx) {
        const div = document.createElement('div');
        div.style.cssText = 'background:#1C2333; border:1px solid #30363D; border-radius:10px; padding:12px 16px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:12px;';
        div.innerHTML = '<div style="width:32px; height:32px; background:#00D4FF; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; font-weight:700; flex-shrink:0;">' + (idx+1) + '</div>' +
          '<div><div style="font-size:0.88rem; font-weight:600;">' + ep.title + '</div></div>';
        div.addEventListener('click', function() { playEpisode(idx); });
        epList.appendChild(div);
      });

      // More like this
      const moreBox = document.getElementById('seriesMore');
      moreBox.innerHTML = '';
      const similar = allVideos.filter(function(v2) { return v2.title !== v.title && v2.category === v.category; });
      if (similar.length === 0) {
        moreBox.innerHTML = '<p style="color:#8B949E; font-size:0.78rem; grid-column:1/-1;">No similar videos found.</p>';
      } else {
        similar.forEach(function(v2) {
          const thumbStyle = v2.thumb ? 'background-image:url(' + v2.thumb + '); background-size:cover; background-position:center;' : '';
          const div = document.createElement('div');
          div.className = 'video-card';
          div.innerHTML = '<div class="thumbnail" style="' + thumbStyle + '"><div class="thumb-overlay"><div class="thumb-title">' + v2.title + '</div></div></div>';
          div.addEventListener('click', function() {
            if (v2.type === 'series') openSeries(v2);
            else playVideo(v2.url, v2.title, v2.category, v2.tags);
          });
          moreBox.appendChild(div);
        });
      }
      loadComments(window._currentSeriesId, 'seriesCommentList');
    }

    async function playEpisode(idx) {
      currentEpIndex = idx;
      const ep = currentSeries.episodes[idx];
      document.getElementById('likeBar').innerHTML = '';
      document.getElementById('seriesSection').style.display  = 'none';
      document.getElementById('playerSection').style.display  = 'block';
      document.getElementById('videoPlayer').src              = ep.url;
      document.getElementById('playerTitle').textContent      = currentSeries.title + ' — ' + ep.title;

      // Refresh likes fresh for this episode
      const lRes = await fetch('/api/likes');
      allLikes   = await lRes.json();

      // === FIX: Clear old tags and inject current series tags dynamically ===
      const tagsBox = document.getElementById('playerTags');
      tagsBox.innerHTML = ''; // Wipes out whatever video tags were loaded before

      if (currentSeries.category) {
        tagsBox.innerHTML += '<span style="background:#00D4FF; color:#000; border-radius:4px; padding:3px 8px; font-size:0.75rem; font-weight:700;">' + currentSeries.category + '</span>';
      }
      if (currentSeries.tags && currentSeries.tags.length) {
        currentSeries.tags.forEach(t => {
          tagsBox.innerHTML += '<span style="background:#1C2333; color:#8B949E; border:1px solid #30363D; border-radius:4px; padding:3px 8px; font-size:0.75rem;">#' + t + '</span>';
        });
      }
      // ======================================================================

      // Show like dislike for this episode
      const likeBar2    = document.getElementById('likeBar');
      const videoLikes2 = allLikes.filter(function(l) { return l.videoUrl === ep.url; });
      const likeCount2  = videoLikes2.filter(function(l) { return l.action === 'like'; }).length;
      const disCount2   = videoLikes2.filter(function(l) { return l.action === 'dislike'; }).length;
      const myLike2     = allLikes.find(function(l) { return l.videoUrl === ep.url && l.username === user.username; });

      likeBar2.innerHTML =
        '<button onclick="toggleLike(\'' + ep.url.replace(/'/g,"\\'") + '\',\'like\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike2 && myLike2.action === 'like' ? '#00D4FF' : '#1C2333') + '; border:1px solid ' + (myLike2 && myLike2.action === 'like' ? '#00D4FF' : '#30363D') + '; color:' + (myLike2 && myLike2.action === 'like' ? '#000' : '#fff') + '; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👍 ' + likeCount2 + '</button>' +
        '<button onclick="toggleLike(\'' + ep.url.replace(/'/g,"\\'") + '\',\'dislike\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike2 && myLike2.action === 'dislike' ? '#ff4444' : '#1C2333') + '; border:1px solid ' + (myLike2 && myLike2.action === 'dislike' ? '#ff4444' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👎 ' + disCount2 + '</button>';

      // Show episode list below player
      const epSection = document.getElementById('episodeSection');
      const epList    = document.getElementById('episodeList');
      epSection.style.display = 'block';
      epList.innerHTML = '';
      currentSeries.episodes.forEach(function(e, i) {
        const div = document.createElement('div');
        div.style.cssText = 'background:' + (i === idx ? '#003a4a' : '#1C2333') + '; border:1px solid ' + (i === idx ? '#00D4FF' : '#30363D') + '; border-radius:8px; padding:10px 14px; margin-bottom:8px; cursor:pointer; display:flex; align-items:center; gap:10px;';
        div.innerHTML = '<div style="width:26px; height:26px; background:' + (i === idx ? '#00D4FF' : '#30363D') + '; border-radius:50%; display:flex; align-items:center; justify-content:center; color:' + (i === idx ? '#000' : '#fff') + '; font-size:0.72rem; font-weight:700; flex-shrink:0;">' + (i+1) + '</div>' +
          '<span style="font-size:0.82rem;">' + e.title + '</span>';
        div.addEventListener('click', function() { playEpisode(i); });
        epList.appendChild(div);
      });

      // Auto play next episode when ended
      const videoEl = document.getElementById('videoPlayer');
      videoEl.onended = function() {
        if (currentEpIndex < currentSeries.episodes.length - 1) {
          playEpisode(currentEpIndex + 1);
        }
      };

      videoEl.play();
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('likeBar').innerHTML = '';
      if (window._progressTimer) clearInterval(window._progressTimer);
      document.getElementById('videoPlayer').pause();
      document.getElementById('videoPlayer').src    = '';
      document.getElementById('videoPlayer').onended = null;
      document.getElementById('playerSection').style.display  = 'none';
      document.getElementById('seriesSection').style.display  = 'none';
      document.getElementById('episodeSection').style.display = 'none';
      document.getElementById('gridSection').style.display    = 'block';
      document.getElementById('filterBar').style.display      = 'flex';
      document.getElementById('ratedSection').style.display   = 'block';
      currentSeries  = null;
      currentEpIndex = 0;
      setTimeout(function() {
        window.scrollTo(0, savedScrollY);
      }, 10);
    }

    function logout() {
      sessionStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    async function pingOnline() {
      if (!user || !user.username) return;
      await fetch('/api/ping', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user.username })
      });
    }
    pingOnline();
    setInterval(pingOnline, 30000);

    function setGrid(size) {
      const grid = document.getElementById('videoGrid');
      if (grid) {
        grid.className = 'video-grid grid-' + size;
        localStorage.setItem('gridSize', size);
      }
    }

    // Restore saved grid preference
    const savedGrid = localStorage.getItem('gridSize') || '2';
    setGrid(savedGrid);

    function toggleMenu() {
      const menu = document.getElementById('dropMenu');
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    function hideMenu() {
      document.getElementById('dropMenu').style.display = 'none';
      document.getElementById('gridSubMenu').style.display = 'none';
    }

    function toggleGridMenu() {
      const sub = document.getElementById('gridSubMenu');
      sub.style.display = sub.style.display === 'none' ? 'block' : 'none';
    }

    // Close menu when tapping outside
    document.addEventListener('click', function(e) {
      const menu = document.getElementById('dropMenu');
      const btn  = document.querySelector('.logout-btn');
      if (menu && btn && !menu.contains(e.target) && e.target !== btn) {
        hideMenu();
      }
    });

    function searchVideos() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!q) { renderVideos(); return; }
      const grid = document.getElementById('videoGrid');
      const filtered = allVideos.filter(v =>
        v.title.toLowerCase().includes(q) ||
        (v.category && v.category.toLowerCase().includes(q)) ||
        (v.tags && v.tags.some(t => t.toLowerCase().includes(q)))
      );
      grid.innerHTML = '';
      if (filtered.length === 0) {
        grid.innerHTML = '<p style="color:#8B949E; padding:16px; grid-column:1/-1;">No results for "' + q + '"</p>';
        return;
      }
      window._videos = filtered;
      filtered.forEach(function(v) {
        const videoUrl     = v.url || '';
        const videoRatings = allRatings.filter(function(r) { return r.videoUrl === videoUrl; });
        const avg = videoRatings.length
          ? (videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length).toFixed(1)
          : null;
        const myRating  = allRatings.find(function(r) { return r.videoUrl === videoUrl && r.username === user.username; });
        const prog      = allProgress.find(function(p) { return p.videoUrl === videoUrl; });
        const watched   = prog && prog.watched;
        const continu   = prog && !prog.watched && prog.current > 0;
        const pct       = prog && prog.duration > 0 ? (prog.current / prog.duration * 100).toFixed(0) : 0;
        const isFav     = allFavorites.includes(videoUrl);

        let stars = '';
        if (v.type !== 'series') {
          for (let s = 1; s <= 5; s++) {
            const color   = myRating && myRating.rating >= s ? '#FFD700' : '#30363D';
            const safeUrl = videoUrl.replace(/'/g, "\\'");
            stars += '<span onclick="event.stopPropagation(); rateVideo(\'' + safeUrl + '\',' + s + ')" style="cursor:pointer; font-size:1rem; color:' + color + ';">★</span>';
          }
        }

        const thumbStyle = v.thumb
          ? 'background-image:url(' + v.thumb + '); background-size:cover; background-position:center;'
          : '';

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML =
          '<div class="thumbnail" style="' + thumbStyle + '">' +
            (watched ? '<div class="thumb-badge" style="background:#00dd66; color:#000;">✓ Watched</div>' :
             continu ? '<div class="thumb-badge" style="background:#FFD700; color:#000;">▶ Continue</div>' :
             v.type === 'series' ? '<div class="thumb-badge">📺 ' + (v.episodes ? v.episodes.length : 0) + ' eps</div>' :
             avg ? '<div class="thumb-badge">★ ' + avg + '</div>' : '<div class="thumb-badge">▶</div>') +
            (v.category ? '<div class="thumb-category">' + v.category + '</div>' : '') +
            '<div class="thumb-overlay">' +
              '<div class="thumb-title">' + v.title + '</div>' +
              (v.type !== 'series' ? '<div style="display:flex; gap:2px; margin-top:4px;">' + stars + '</div>' : '') +
              (continu ? '<div style="background:rgba(0,0,0,0.5); border-radius:999px; height:4px; margin-top:6px; overflow:hidden;"><div style="background:#00D4FF; height:100%; width:' + pct + '%;"></div></div>' : '') +
            '</div>' +
          '</div>';

        card.addEventListener('click', function() {
          if (v.type === 'series') openSeries(v);
          else playVideo(v.url, v.title, v.category, v.tags);
        });
        grid.appendChild(card);
      });
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      renderVideos();
    }

    async function toggleFav(videoUrl) {
      await fetch('/api/togglefavorite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user.username, videoUrl })
      });
      loadVideos();
    }

    async function toggleLike(videoUrl, action) {
      await fetch('/api/togglelike', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user.username, videoUrl, action })
      });
      const lRes = await fetch('/api/likes');
      allLikes   = await lRes.json();

      const videoLikes = allLikes.filter(function(l) { return l.videoUrl === videoUrl; });
      const likeCount  = videoLikes.filter(function(l) { return l.action === 'like'; }).length;
      const disCount   = videoLikes.filter(function(l) { return l.action === 'dislike'; }).length;
      const myLike     = allLikes.find(function(l) { return l.videoUrl === videoUrl && l.username === user.username; });

      const likeBar = document.getElementById('likeBar');
      likeBar.innerHTML =
        '<button onclick="toggleLike(\'' + videoUrl.replace(/'/g,"\\'") + '\',\'like\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'like' ? '#00D4FF' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'like' ? '#00D4FF' : '#30363D') + '; color:' + (myLike && myLike.action === 'like' ? '#000' : '#fff') + '; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👍 ' + likeCount + '</button>' +
        '<button onclick="toggleLike(\'' + videoUrl.replace(/'/g,"\\'") + '\',\'dislike\')" style="display:flex; align-items:center; gap:6px; background:' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#1C2333') + '; border:1px solid ' + (myLike && myLike.action === 'dislike' ? '#ff4444' : '#30363D') + '; color:#fff; border-radius:999px; padding:8px 16px; font-size:0.85rem; cursor:pointer; width:auto;">👎 ' + disCount + '</button>';
    }

    function renderRatedRows() {
      const ratedVideos = allVideos.filter(function(v) {
        const id = v.type === 'series' ? (v.filename || v.title) : (v.url || '');
        const videoRatings = allRatings.filter(function(r) { return r.videoUrl === id; });
        return videoRatings.length > 0;
      }).map(function(v) {
        const id = v.type === 'series' ? (v.filename || v.title) : (v.url || '');
        const videoRatings = allRatings.filter(function(r) { return r.videoUrl === id; });
        const avg = videoRatings.reduce(function(a,b) { return a + b.rating; }, 0) / videoRatings.length;
        return { v, avg };
      });

      const topRated   = ratedVideos.filter(function(item) { return item.avg >= 3; }).sort(function(a,b) { return b.avg - a.avg; }).slice(0, 5);
      const leastRated = ratedVideos.filter(function(item) { return item.avg <= 2; }).sort(function(a,b) { return a.avg - b.avg; }).slice(0, 5);

      function buildSmallCard(item) {
        const thumbStyle = item.v.thumb
          ? 'background-image:url(' + item.v.thumb + '); background-size:cover; background-position:center;'
          : '';
        const div = document.createElement('div');
        div.style.cssText = 'flex-shrink:0; width:100px; cursor:pointer;';
        div.innerHTML =
          '<div style="width:100px; height:140px; border-radius:8px; background:#1C2333; overflow:hidden; position:relative; ' + thumbStyle + '">' +
            '<div style="position:absolute; top:4px; left:4px; background:rgba(0,0,0,0.75); color:#FFD700; font-size:0.6rem; font-weight:700; padding:2px 5px; border-radius:4px;">★ ' + item.avg.toFixed(1) + '</div>' +
            '<div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.9)); padding:16px 5px 5px;">' +
              '<div style="color:#fff; font-size:0.6rem; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">' + item.v.title + '</div>' +
            '</div>' +
          '</div>';
        div.addEventListener('click', function() {
          if (item.v.type === 'series') openSeries(item.v);
          else playVideo(item.v.url, item.v.title, item.v.category, item.v.tags);
        });
        return div;
      }

      const topRow   = document.getElementById('topRatedRow');
      const leastRow = document.getElementById('leastRatedRow');
      topRow.innerHTML   = '';
      leastRow.innerHTML = '';

      if (topRated.length === 0) {
        topRow.innerHTML = '<p style="color:#8B949E; font-size:0.78rem;">No videos rated 3 stars or above.</p>';
      } else {
        topRated.forEach(function(item) { topRow.appendChild(buildSmallCard(item)); });
      }

      if (leastRated.length === 0) {
        leastRow.innerHTML = '<p style="color:#8B949E; font-size:0.78rem;">No videos rated below 2 stars.</p>';
      } else {
        leastRated.forEach(function(item) { leastRow.appendChild(buildSmallCard(item)); });
      }
    }

    function buildCommentRow(c, listElId) {
      const isMine = c.username === user.username;
      const div = document.createElement('div');
      div.style.cssText = 'display:flex; gap:10px; margin-bottom:14px;';
      div.innerHTML =
        '<div style="width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#00D4FF,#0077ff); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0;">' + (c.avatar || '😀') + '</div>' +
        '<div style="flex:1;">' +
          '<div style="display:flex; align-items:center; gap:8px;">' +
            '<span style="font-size:0.82rem; font-weight:700;">' + c.username + '</span>' +
            '<span style="font-size:0.68rem; color:#8B949E;">' + c.time + '</span>' +
          '</div>' +
          '<div style="font-size:0.82rem; margin-top:2px;">' + c.text + '</div>' +
          (isMine ? '<button onclick="deleteComment(\'' + c.id + '\',\'' + listElId + '\')" style="background:none; border:none; color:#ff6666; font-size:0.7rem; cursor:pointer; padding:0; margin-top:4px; width:auto;">🗑 Delete</button>' : '') +
        '</div>';
      return div;
    }

    async function loadComments(videoUrl, listElId) {
      const res      = await fetch('/api/comments?videoUrl=' + encodeURIComponent(videoUrl));
      const comments = await res.json();
      const list     = document.getElementById(listElId);
      list.innerHTML = '';
      if (comments.length === 0) {
        list.innerHTML = '<p style="color:#8B949E; font-size:0.8rem;">No comments yet. Be the first!</p>';
        return;
      }
      comments.forEach(function(c) {
        list.appendChild(buildCommentRow(c, listElId));
      });
    }

    async function postComment() {
      const input = document.getElementById('commentInput');
      const text  = input.value.trim();
      if (!text) return;
      await fetch('/api/addcomment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoUrl: window._currentVideoUrl, username: user.username, avatar: user.avatar, text })
      });
      input.value = '';
      loadComments(window._currentVideoUrl, 'commentList');
    }

    async function postSeriesComment() {
      const input = document.getElementById('seriesCommentInput');
      const text  = input.value.trim();
      if (!text) return;
      await fetch('/api/addcomment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoUrl: window._currentSeriesId, username: user.username, avatar: user.avatar, text })
      });
      input.value = '';
      loadComments(window._currentSeriesId, 'seriesCommentList');
    }

    async function deleteComment(id, listElId) {
      if (!confirm('Delete this comment?')) return;
      await fetch('/api/deletecomment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      const videoUrl = listElId === 'commentList' ? window._currentVideoUrl : window._currentSeriesId;
      loadComments(videoUrl, listElId);
    }

    loadVideos();
  </script>

</body>
